<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Todo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa;
    --text: #2C3E50;
    --accent: #4A6FA5;
    --success: #2D936C;
    --alert: #E07A5F;
    --warning: #F2CC8F;
    --muted: #888;
    --card: #fff;
    --border: #ececec;
    --hover: #fcfcfc;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);

    /* Quadrants Eisenhower */
    --q-faire: #E07A5F;      /* Important + Urgent */
    --q-planifier: #D9A441;  /* Important, pas urgent */
    --q-deleguer: #4A6FA5;   /* Urgent, pas important */
    --q-eliminer: #9aa3ad;   /* Ni l'un ni l'autre */

    --star: #F2B705;         /* étoile "Important" */

    /* Statuts de projet (Kanban) */
    --st-pas_commence: #E8924A;
    --st-en_cours:     #4A6FA5;
    --st-en_pause:     #C9637E;
    --st-delegue:      #9B7EBD;
    --st-termine:      #2D936C;
  }

  /* Mode nuit (thème des quiz capitales) */
  body.dark {
    --bg: #0b1120;
    --text: #e2e8f0;
    --card: #131b2e;
    --muted: #64748b;
    --border: #1e293b;
    --hover: #1a2438;
    --shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  body.dark .field input, body.dark .field textarea { background: var(--card); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== LAYOUT ===== */
  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--card);
    border-right: 1px solid var(--border);
    padding: 64px 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }
  /* Liste des vues : occupe la hauteur restante et défile si besoin */
  .nav-scroll {
    flex: 1; min-height: 0; overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
    margin: 0 -14px; padding: 0 14px;
  }

  .main {
    flex: 1;
    padding: 40px 48px;
    width: 100%;
    min-width: 0;
  }

  /* ===== SIDEBAR ===== */
  .add-btn {
    display: flex; align-items: center; gap: 10px;
    background: none; border: none; cursor: pointer;
    color: var(--alert); font-family: inherit; font-size: 16px; font-weight: 600;
    padding: 10px 12px; border-radius: var(--radius);
    transition: background .2s;
    width: 100%; text-align: left;
  }
  .add-btn:hover { background: rgba(224,122,95,.08); }
  .add-btn .plus {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--alert); color: #fff;
    display: grid; place-items: center; font-size: 18px; line-height: 1;
  }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 12px; border-radius: var(--radius);
    cursor: pointer; color: var(--text); font-size: 15px;
    transition: background .2s; border: none; background: none;
    font-family: inherit; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(74,111,165,.07); }
  .nav-item.active { background: rgba(224,122,95,.1); color: var(--alert); font-weight: 600; }
  .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
  .nav-item .count { margin-left: auto; color: var(--muted); font-size: 13px; }
  .nav-item.soon { color: var(--muted); cursor: default; }
  .nav-item.soon:hover { background: none; }
  .nav-item.soon .count { font-size: 11px; font-style: italic; }

  .nav-sep { height: 1px; background: var(--border); margin: 12px 4px; }

  /* ===== MAIN ===== */
  .main-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
  .main-head .titles { flex: 1; min-width: 0; }
  .view-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .view-sub { color: var(--muted); font-size: 14px; }
  .head-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .icon-btn {
    background: var(--card); border: 1px solid var(--border); border-radius: 50%;
    width: 40px; height: 40px; cursor: pointer; font-size: 18px; color: var(--text);
    flex-shrink: 0; transition: background .2s; box-shadow: var(--shadow);
    display: grid; place-items: center;
  }
  .icon-btn:hover { background: var(--hover); }

  .toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .sort-select {
    font-family: inherit; font-size: 13px; color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 6px 10px; background: var(--card); cursor: pointer;
  }

  /* ===== QUICK ADD ===== */
  .quick-add { margin-bottom: 22px; }
  .quick-add-row { display: flex; gap: 8px; align-items: center; }
  .quick-input {
    flex: 1; font-family: inherit; font-size: 15px; color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; background: var(--card); outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .quick-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(74,111,165,.12); }
  .quick-submit {
    font-family: inherit; font-size: 15px; font-weight: 600; color: #fff;
    background: var(--accent); border: none; border-radius: var(--radius);
    padding: 12px 18px; cursor: pointer; transition: opacity .2s;
    white-space: nowrap;
  }
  .quick-submit:hover { opacity: .9; }
  .flags { display: flex; gap: 8px; margin-top: 10px; padding-left: 2px; }
  .flag {
    font-family: inherit; font-size: 13px; cursor: pointer;
    border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 12px; background: var(--card); color: var(--muted);
    transition: all .2s; user-select: none;
  }
  .flag.on[data-flag="urgent"] { background: var(--alert); color: #fff; border-color: var(--alert); }
  .flag.on[data-flag="important"] { background: var(--accent); color: #fff; border-color: var(--accent); }
  .flag .star { color: var(--star); }

  /* ===== TASK LIST ===== */
  .task-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }

  /* Carte = UN SEUL contour par tâche racine (englobe ses sous-tâches) */
  .task {
    border-radius: var(--radius);
    border-left: 3px solid transparent;
    background: var(--card); box-shadow: var(--shadow);
    animation: fadeUp .25s ease; overflow: hidden;
  }
  .task.q-faire { border-left-color: var(--q-faire); }
  .task.q-planifier { border-left-color: var(--q-planifier); }
  .task.q-deleguer { border-left-color: var(--q-deleguer); }
  .task.q-eliminer { border-left-color: var(--q-eliminer); }

  /* Une ligne (racine ou sous-tâche) à l'intérieur de la carte */
  .task-row {
    display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px;
    cursor: pointer; transition: background .15s;
    padding-left: calc(14px + var(--depth, 0) * 22px);   /* indentation des sous-tâches */
  }
  .task-row:hover { background: var(--hover); }
  /* Séparateur léger entre lignes + trait vertical d'indentation pour les sous-tâches */
  .task-row + .task-row,
  .task-addsub-zone + .task-row { border-top: 1px solid var(--border); }
  .task-row[style*="--depth:1"], .task-row[style*="--depth:2"], .task-row[style*="--depth:3"] {
    position: relative;
  }
  .task-row[style*="--depth:1"]::before,
  .task-row[style*="--depth:2"]::before,
  .task-row[style*="--depth:3"]::before {
    content: ""; position: absolute; top: 0; bottom: 0;
    left: calc(8px + (var(--depth) - 1) * 22px);
    width: 2px; background: var(--border); border-radius: 2px;
  }

  .task-chevron, .task-chevron-spacer {
    width: 18px; flex-shrink: 0; margin-top: 2px;
    background: none; border: none; cursor: pointer; padding: 0;
    color: var(--muted); font-size: 12px; text-align: center; line-height: 20px;
  }
  .task-chevron:hover { color: var(--text); }

  .checkbox {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--muted); cursor: pointer; margin-top: 2px;
    transition: all .2s; background: none; position: relative;
  }
  /* Le contour coloré (priorité) ne s'applique qu'aux racines (depth 0) */
  .task.q-faire .task-row[style*="--depth:0"] .checkbox { border-color: var(--q-faire); }
  .task.q-planifier .task-row[style*="--depth:0"] .checkbox { border-color: var(--q-planifier); }
  .task.q-deleguer .task-row[style*="--depth:0"] .checkbox { border-color: var(--q-deleguer); }
  .checkbox:hover { transform: scale(1.1); }
  .checkbox::after {
    content: '✓'; position: absolute; inset: 0; display: grid; place-items: center;
    color: #fff; font-size: 12px; opacity: 0; transition: opacity .15s;
  }
  .task-row.done .checkbox { background: var(--success); border-color: var(--success); }
  .task-row.done .checkbox::after { opacity: 1; }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 15px; word-break: break-word; }
  .task-row.done .task-title { text-decoration: line-through; color: var(--muted); }
  .task-note { font-size: 13px; color: var(--muted); margin-top: 2px; word-break: break-word; }
  .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
  .task-body .proj-progress { margin-top: 7px; max-width: 240px; }
  .due, .task-project, .task-contact {
    font-size: 12px; color: var(--muted);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .due.today { color: var(--success); font-weight: 500; }
  .due.overdue { color: var(--alert); font-weight: 500; }

  .task-addsub {
    opacity: 0; background: none; border: none; cursor: pointer;
    align-self: center; padding: 0 4px; flex-shrink: 0; transition: opacity .2s;
  }
  .task-addsub .plus-sm { font-size: 16px; font-weight: 600; line-height: 1; color: var(--accent); }
  .task-row:hover .task-addsub { opacity: 1; }
  .task-addsub-zone { padding: 0 14px 12px calc(48px + var(--depth, 0) * 22px); }
  .task-addsub-input {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text);
    border: 1px solid var(--accent); border-radius: 8px; padding: 8px 10px;
    background: var(--card); outline: none;
  }

  .task-del {
    opacity: 0; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 18px; padding: 0 4px; align-self: center;
    transition: opacity .2s, color .2s;
  }
  .task-row:hover .task-del { opacity: 1; }
  .task-del:hover { color: var(--alert); }

  .empty {
    text-align: center; color: var(--muted); padding: 60px 20px; font-size: 15px;
  }
  .empty .big { font-size: 40px; margin-bottom: 12px; }

  /* ===== MATRICE EISENHOWER ===== */
  .eisen-grid { display: none; grid-template-columns: 1fr 1fr; gap: 14px; }
  .eisen-cell {
    background: var(--card); border: 1px solid var(--border);
    border-top: 3px solid var(--muted); border-radius: var(--radius);
    padding: 14px; box-shadow: var(--shadow);
  }
  .eisen-cell.q-faire { border-top-color: var(--q-faire); }
  .eisen-cell.q-planifier { border-top-color: var(--q-planifier); }
  .eisen-cell.q-deleguer { border-top-color: var(--q-deleguer); }
  .eisen-cell.q-eliminer { border-top-color: var(--q-eliminer); }
  .eisen-head { display: flex; flex-direction: column; margin-bottom: 8px; }
  .eisen-title { font-weight: 600; font-size: 15px; }
  .eisen-sub { font-size: 12px; color: var(--muted); }
  .eisen-cell .task { box-shadow: none; background: transparent; border-left-color: transparent; }
  .eisen-cell .task-row { padding: 8px 6px; }
  .eisen-cell .task-row:hover { background: rgba(0,0,0,.03); }
  body.dark .eisen-cell .task-row:hover { background: rgba(255,255,255,.04); }
  .col-empty { color: var(--muted); font-size: 13px; padding: 6px; }
  .eisen-add { margin-top: 6px; }
  .eisen-add-btn {
    display: flex; align-items: center; width: 100%;
    background: none; border: none; cursor: pointer;
    font-family: inherit; padding: 6px; border-radius: 8px;
    transition: background .15s;
  }
  .eisen-add-btn:hover { background: rgba(0,0,0,.03); }
  body.dark .eisen-add-btn:hover { background: rgba(255,255,255,.04); }
  .eisen-add-btn .plus-sm { font-size: 20px; font-weight: 600; line-height: 1; }
  .q-faire     .plus-sm { color: var(--q-faire); }
  .q-planifier .plus-sm { color: var(--q-planifier); }
  .q-deleguer  .plus-sm { color: var(--q-deleguer); }
  .q-eliminer  .plus-sm { color: var(--q-eliminer); }
  .eisen-add-input {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text);
    border: 1px solid var(--accent); border-radius: 8px; padding: 9px 10px;
    background: var(--card); outline: none;
  }

  /* ===== DRAG AND DROP (matrice) ===== */
  .eisen-cell .task { cursor: grab; touch-action: pan-y; }
  .task.dragging { opacity: .35; pointer-events: none; }
  .drag-ghost {
    position: fixed; z-index: 100; pointer-events: none;
    opacity: .95; border-radius: var(--radius); background: var(--card);
    box-shadow: 0 10px 28px rgba(0,0,0,.28); padding: 8px 10px;
    transform: rotate(1.5deg);
  }
  .task.drag-ghost { padding: 12px 14px; }
  .eisen-cell.drop-target {
    background: rgba(74,111,165,.08);
    outline: 2px dashed var(--accent); outline-offset: -2px;
  }
  body.is-dragging { cursor: grabbing; user-select: none; touch-action: none; overflow: hidden; }

  /* ===== KANBAN PROJETS ===== */
  .kanban-board { display: none; gap: 14px; align-items: flex-start; overflow-x: auto; padding-bottom: 8px; }
  .kanban-col {
    flex: 1 1 0; min-width: 240px;
    background: var(--card); border: 1px solid var(--border);
    border-top: 3px solid var(--muted); border-radius: var(--radius);
    padding: 14px; box-shadow: var(--shadow);
  }
  .kanban-col.st-pas_commence { border-top-color: var(--st-pas_commence); }
  .kanban-col.st-en_cours { border-top-color: var(--st-en_cours); }
  .kanban-col.st-en_pause { border-top-color: var(--st-en_pause); }
  .kanban-col.st-delegue { border-top-color: var(--st-delegue); }
  .kanban-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .kanban-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .st-pas_commence .kanban-dot { background: var(--st-pas_commence); }
  .st-en_cours .kanban-dot { background: var(--st-en_cours); }
  .st-en_pause .kanban-dot { background: var(--st-en_pause); }
  .st-delegue .kanban-dot { background: var(--st-delegue); }
  .kanban-title { font-weight: 600; font-size: 14px; }
  .kanban-count { color: var(--muted); font-size: 13px; }
  .kanban-list { list-style: none; display: flex; flex-direction: column; gap: 8px; min-height: 8px; }

  .projects-tabs { display: none; gap: 8px; margin-bottom: 18px; }
  #projectsPriorities { display: none; margin-top: 32px; }
  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
  .section-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .done-list { display: none; list-style: none; flex-direction: column; gap: 10px; max-width: 560px; }
  .done-list .proj-card { cursor: pointer; }
  .done-list .proj-add, .done-list .proj-add-zone { display: none; }  /* pas d'ajout de tâche sur un projet terminé */

  .proj-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px; cursor: grab; touch-action: pan-y; transition: background .15s;
  }
  .proj-card:hover { border-color: var(--accent); }
  .proj-card.dragging { opacity: .35; pointer-events: none; }
  .proj-head { display: flex; align-items: center; gap: 8px; }
  .proj-icon { font-size: 18px; flex-shrink: 0; }
  .proj-name { font-weight: 600; font-size: 15px; word-break: break-word; flex: 1; }
  .proj-del {
    opacity: 0; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 18px; line-height: 1; padding: 0 2px;
    flex-shrink: 0; transition: opacity .2s, color .2s;
  }
  .proj-card:hover .proj-del { opacity: 1; }
  .proj-del:hover { color: var(--alert); }
  .proj-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .proj-empty { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }
  .proj-progress {
    display: flex; align-items: center; gap: 8px; margin-top: 8px;
  }
  .proj-bar {
    flex: 1; height: 7px; border-radius: 4px; background: var(--border); overflow: hidden;
  }
  .proj-bar-fill {
    height: 100%; border-radius: 4px; background: var(--proj-color, var(--muted)); transition: width .3s ease;
  }
  .proj-pct { font-size: 12px; color: var(--muted); font-weight: 600; flex-shrink: 0; min-width: 32px; text-align: right; }
  .proj-add {
    display: flex; align-items: center; gap: 6px; width: 100%; margin-top: 8px;
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-family: inherit; font-size: 13px; padding: 4px; border-radius: 8px;
    transition: color .15s;
  }
  .proj-add:hover { color: var(--accent); }
  .proj-add .plus-sm { font-size: 16px; font-weight: 600; line-height: 1; color: var(--proj-color, var(--accent)); }

  .col-add { margin-top: 10px; }
  .col-add-btn {
    display: flex; align-items: center; gap: 6px; width: 100%;
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-family: inherit; font-size: 14px; padding: 6px; border-radius: 8px;
    transition: color .15s;
  }
  .col-add-btn:hover { color: var(--accent); }
  .col-add-btn .plus-sm { font-size: 18px; font-weight: 600; line-height: 1; }
  .st-pas_commence .col-add-btn .plus-sm { color: var(--st-pas_commence); }
  .st-delegue .col-add-btn .plus-sm { color: var(--st-delegue); }
  .col-add-input, .proj-add-input {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text);
    border: 1px solid var(--accent); border-radius: 8px; padding: 9px 10px;
    background: var(--card); outline: none; margin-top: 6px;
  }
  .proj-add-zone .flags { gap: 6px; margin-top: 8px; }
  .proj-add-zone .flag { font-size: 12px; padding: 4px 10px; }

  /* ===== VUE DÉTAILLÉE D'UN PROJET ===== */
  .project-view { display: none; }
  .proj-detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .proj-detail-icon {
    font-size: 26px; background: none; border: none; cursor: pointer;
    border-radius: 10px; padding: 2px 6px; line-height: 1; transition: background .2s;
  }
  .proj-detail-icon:hover { background: var(--bg); }
  .proj-detail-name {
    flex: 1; min-width: 160px; font-family: inherit; font-size: 22px; font-weight: 700;
    color: var(--text); border: none; background: none; outline: none;
    border-bottom: 2px solid transparent; padding: 2px 0;
  }
  .proj-detail-name:focus { border-bottom-color: var(--accent); }
  .proj-status-select {
    font-family: inherit; font-size: 14px; color: var(--text); cursor: pointer;
    border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; background: var(--card);
  }
  .proj-subviews { display: flex; gap: 8px; margin-bottom: 18px; }
  .subview-btn {
    font-family: inherit; font-size: 14px; cursor: pointer; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px; padding: 7px 16px;
    background: var(--card); transition: all .2s;
  }
  .subview-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #projListWrap .quick-add-row { margin-bottom: 14px; }

  /* ===== VUE CONTACTS ===== */
  .contacts-view { display: none; }
  .contacts-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
  .search-box { flex: 1; position: relative; display: flex; align-items: center; }
  .search-icon { position: absolute; left: 12px; font-size: 14px; opacity: .6; pointer-events: none; }
  .search-input {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px 11px 38px;
    background: var(--card); outline: none; transition: border-color .2s, box-shadow .2s;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(74,111,165,.12); }

  .contact-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .contact-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow);
  }

<script>
"use strict";

/* =========================================================
   CONFIG
   ========================================================= */
const STORAGE_KEY = "todo_app_v1";
const THEME_KEY = "todo_theme";
const DAY_MS = 86400000;                 // millisecondes dans une journée
const DEFAULT_PROJECT_ICON = "📁";       // icône par défaut d'un nouveau projet

// Matrice d'Eisenhower : pour chaque quadrant, libellé, description et drapeaux urgent/important.
// La classe CSS d'un quadrant est toujours "q-" + sa clé (ex : q-faire).
const QUADRANTS = {
  faire:     { label: "Faire",     desc: "Important + Urgent",     urgent: true,  important: true },
  planifier: { label: "Planifier", desc: "Important, pas urgent",  urgent: false, important: true },
  deleguer:  { label: "Déléguer",  desc: "Urgent, pas important",  urgent: true,  important: false },
  eliminer:  { label: "Éliminer",  desc: "Ni urgent ni important", urgent: false, important: false }
};
const QUADRANT_ORDER = ["faire", "planifier", "deleguer", "eliminer"];

function quadrantOf(task) {
  if (task.urgent && task.important) return "faire";
  if (task.important) return "planifier";
  if (task.urgent) return "deleguer";
  return "eliminer";
}

// Statuts d'un projet. Les 4 premiers forment les colonnes du Kanban ;
// "termine" n'y figure pas (les projets terminés ont leur propre vue).
const STATUSES = {
  pas_commence: { label: "Pas commencé", cls: "st-pas_commence" },
  en_cours:     { label: "En cours",     cls: "st-en_cours" },
  en_pause:     { label: "En pause",     cls: "st-en_pause" },
  delegue:      { label: "Délégué",      cls: "st-delegue" },
  termine:      { label: "Terminé",      cls: "st-termine" }
};
const KANBAN_STATUSES = ["en_cours", "en_pause", "delegue", "pas_commence"];

/* =========================================================
   STATE
   ========================================================= */
let state = {
  tasks: [],
  projects: [],
  contacts: [],
  view: "todo",
  sort: "due",
  editingId: null,
  projectId: null,        // projet actuellement ouvert (vue détaillée)
  projSub: "eisen",       // sous-vue du projet par défaut : "eisen" (matrice) ou "list"
  projectsTab: "active",  // onglet de la vue Projets : "active" (tableau) ou "done" (terminés)
  contactSearch: "",      // texte de recherche dans la vue Contacts
  collapsedTasks: new Set()  // ids des tâches dont les sous-tâches sont repliées
};

/* =========================================================
   DATA LAYER
   Tout passe par db.* — c'est le seul module à remplacer quand on
   migrera vers une sync en ligne (Firebase, étape 5) : il suffira de
   réécrire load/save, le reste de l'app ne changera pas.
   ========================================================= */

// Transforme des données brutes (localStorage OU futur Firebase) en {tasks, projects}.
// Gère l'ancien format (simple tableau de tâches) pour ne rien perdre.
function normalizeData(raw) {
  if (Array.isArray(raw)) return { tasks: raw, projects: [], contacts: [] };
  if (raw && typeof raw === "object") return {
    tasks: raw.tasks || [],
    projects: raw.projects || [],
    contacts: raw.contacts || []
  };
  return { tasks: [], projects: [], contacts: [] };
}

const db = {
  load() {
    let raw = null;
    try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch {}
    const data = normalizeData(raw);
    state.tasks = data.tasks;
    state.projects = data.projects;
    state.contacts = data.contacts;
  },
  save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tasks: state.tasks, projects: state.projects, contacts: state.contacts
    }));
  },
  // --- Tâches ---
  add(task) { state.tasks.push(task); this.save(); },
  update(id, changes) {
    const t = state.tasks.find(t => t.id === id);
    if (t) { Object.assign(t, changes); this.save(); }
  },
  remove(id) {
    state.tasks = state.tasks.filter(t => t.id !== id);
    this.save();
  },
  // --- Projets ---
  addProject(p) { state.projects.push(p); this.save(); },
  updateProject(id, changes) {
    const p = state.projects.find(p => p.id === id);
    if (p) { Object.assign(p, changes); this.save(); }
  },
  removeProject(id) {
    state.projects = state.projects.filter(p => p.id !== id);
    this.save();
  },
  // --- Contacts ---
  addContact(c) { state.contacts.push(c); this.save(); },
  updateContact(id, changes) {
    const c = state.contacts.find(c => c.id === id);
    if (c) { Object.assign(c, changes); this.save(); }
  },
  removeContact(id) {
    state.contacts = state.contacts.filter(c => c.id !== id);
    this.save();
  }
};

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

const $ = id => document.getElementById(id);

// Accès à un élément par son id dans chaque collection
const getTask = id => state.tasks.find(t => t.id === id);
const getProject = id => state.projects.find(p => p.id === id);
const getContact = id => state.contacts.find(c => c.id === id);

function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function endOfToday() { return startOfDay(new Date()).getTime() + DAY_MS - 1; }
function isDueToday(t) { return t.dueDate != null && t.dueDate <= endOfToday(); }

/* =========================================================
   PARSER DE DATES (français, maison)
   Extrait une date/heure du texte et renvoie le titre nettoyé.
   ========================================================= */
const WEEKDAYS = {
  lundi: 1, mardi: 2, mercredi: 3, jeudi: 4,
  vendredi: 5, samedi: 6, dimanche: 0
};
const MONTHS = {
  janvier:0, février:1, fevrier:1, mars:2, avril:3, mai:4, juin:5,
  juillet:6, août:7, aout:7, septembre:8, octobre:9, novembre:10, décembre:11, decembre:11
};
const NUM_WORDS = {
  un:1, une:1, deux:2, trois:3, quatre:4, cinq:5,
  six:6, sept:7, huit:8, neuf:9, dix:10
};

function parseInput(raw) {
  let text = " " + raw.trim() + " ";
  let date = null;     // objet Date (jour) ou null
  let time = null;     // "HH:MM" ou null
  let urgent = false, important = false;

  const consume = (regex, fn) => {
    const m = text.match(regex);
    if (m) { fn(m); text = text.replace(m[0], " "); return true; }
    return false;
  };

  // --- Heure : "18h", "18h30", "à 9h", "9:30" ---
  consume(/\b(?:à\s*)?(\d{1,2})\s*h\s*(\d{2})?\b/i, m => {
    const h = m[1].padStart(2, "0");
    const min = (m[2] || "00").padStart(2, "0");
    time = h + ":" + min;
  });
  if (!time) {
    consume(/\b(\d{1,2}):(\d{2})\b/, m => {
      time = m[1].padStart(2,"0") + ":" + m[2];
    });
  }

  const today = startOfDay(new Date());

  // --- Mots-clés relatifs ---
  if (!date && consume(/\baujourd'?hui\b/i, () => {})) date = new Date(today);
  if (!date && consume(/\bapr[èe]s[-\s]demain\b/i, () => {})) {
    date = new Date(today); date.setDate(date.getDate() + 2);
  }
  if (!date && consume(/\bdemain\b/i, () => {})) {
    date = new Date(today); date.setDate(date.getDate() + 1);
  }

  // --- "dans X jours/semaines/mois/ans" (X en chiffres ou en lettres) ---
  if (!date) consume(/\bdans\s+(\d{1,3}|un|une|deux|trois|quatre|cinq|six|sept|huit|neuf|dix)\s+(jours?|journ[ée]es?|semaines?|mois|ans?|années?)\b/i, m => {
    date = new Date(today);
    const w = m[1].toLowerCase();
    const n = /^\d+$/.test(w) ? parseInt(w, 10) : NUM_WORDS[w];
    const unit = m[2].toLowerCase();
    if (/semaine/.test(unit)) date.setDate(date.getDate() + n * 7);
    else if (/mois/.test(unit)) date.setMonth(date.getMonth() + n);
    else if (/an/.test(unit)) date.setFullYear(date.getFullYear() + n);
    else date.setDate(date.getDate() + n);
  });

  // --- Jour de la semaine : "lundi", "lundi prochain" ---
  if (!date) consume(/\b(lundi|mardi|mercredi|jeudi|vendredi|samedi|dimanche)(\s+prochain)?\b/i, m => {
    const target = WEEKDAYS[m[1].toLowerCase()];
    date = new Date(today);
    let diff = (target - date.getDay() + 7) % 7;
    if (diff === 0) diff = 7;                 // "lundi" = le prochain lundi
    date.setDate(date.getDate() + diff);
  });

  // --- Date "15/03" ou "15/03/2026" ---
  if (!date) consume(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/, m => {
    const day = parseInt(m[1],10), mon = parseInt(m[2],10) - 1;
    let year = m[3] ? parseInt(m[3],10) : today.getFullYear();
    if (year < 100) year += 2000;
    date = new Date(year, mon, day);
    if (!m[3] && date < today) date.setFullYear(year + 1); // date passée -> année suivante
  });

  // --- Date "15 mars" ---
  if (!date) consume(/\b(\d{1,2})\s+(janvier|février|fevrier|mars|avril|mai|juin|juillet|août|aout|septembre|octobre|novembre|décembre|decembre)\b/i, m => {
    const day = parseInt(m[1],10);
    const mon = MONTHS[m[2].toLowerCase()];
    let year = today.getFullYear();
    date = new Date(year, mon, day);
    if (date < today) date.setFullYear(year + 1);
  });

  // --- Priorité : mots "urgent" / "important" dans le texte ---
  consume(/\burgente?s?\b/i, () => { urgent = true; });
  consume(/\bimportante?s?\b/i, () => { important = true; });

  const title = text.replace(/\s+/g, " ").trim();
  return {
    title: title || raw.trim(),
    dueDate: date ? date.getTime() : null,
    dueTime: time,
    urgent,
    important
  };
}

/* =========================================================
   FORMAT D'AFFICHAGE DES DATES
   ========================================================= */
const DAY_NAMES = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
const MONTH_NAMES = ["jan","fév","mars","avr","mai","juin","juil","août","sept","oct","nov","déc"];

function formatDue(task) {
  if (!task.dueDate) return null;
  const d = startOfDay(task.dueDate);
  const today = startOfDay(new Date());
  const diff = Math.round((d - today) / DAY_MS);

  let label, cls = "";
  if (diff < 0) { label = "En retard"; cls = "overdue"; }
  else if (diff === 0) { label = "Aujourd'hui"; cls = "today"; }
  else if (diff === 1) label = "Demain";
  else if (diff < 7) label = DAY_NAMES[d.getDay()];
  else label = d.getDate() + " " + MONTH_NAMES[d.getMonth()];

  if (task.dueTime) label += " " + task.dueTime;
  return { label, cls };
}

/* =========================================================
   SÉCURITÉ : échappement du contenu utilisateur (anti-XSS)
   ========================================================= */
function esc(s) {
  const d = document.createElement("div");
  d.textContent = s ?? "";
  return d.innerHTML;
}

/* =========================================================
   VUES
   ========================================================= */
function visibleTasks() {
  let list = state.tasks.filter(t => !t.completed);
  if (state.view === "today") {
    // Vue échéance : toute tâche due aujourd'hui, racine ou sous-tâche, à plat
    list = list.filter(isDueToday);
    state.flatList = true;
  } else {
    // Todo : seulement les racines ; les sous-tâches s'affichent en dépliant
    list = list.filter(t => t.parentTaskId == null);
    state.flatList = false;
  }
  return sortTasks(list);
}

function sortTasks(list) {
  const copy = [...list];
  if (state.sort === "quadrant") {
    copy.sort((a,b) => QUADRANT_ORDER.indexOf(quadrantOf(a)) - QUADRANT_ORDER.indexOf(quadrantOf(b)));
  } else if (state.sort === "created") {
    copy.sort((a,b) => a.createdAt - b.createdAt);
  } else { // due : sans date à la fin
    copy.sort((a,b) => {
      if (a.dueDate == null && b.dueDate == null) return 0;
      if (a.dueDate == null) return 1;
      if (b.dueDate == null) return -1;
      return a.dueDate - b.dueDate;
    });
  }
  return copy;
}

// HTML d'UNE ligne de tâche (racine ou sous-tâche), sans carte englobante.
// depth : 0 = racine, 1+ = sous-tâche (indentation par un trait vertical).
function taskRowHtml(task, depth) {
  const due = formatDue(task);

  // Nom du projet, affiché seulement dans les vues globales (pas dans la vue projet)
  const project = (task.projectId && state.view !== "project") ? getProject(task.projectId) : null;
  const metaParts = [];
  if (due) metaParts.push(`<span class="due ${due.cls}">📅 ${esc(due.label)}</span>`);
  if (project) {
    metaParts.push(`<span class="task-project">${esc(project.icon || DEFAULT_PROJECT_ICON)} ${esc(project.name)}</span>`);
    if (project.status === "delegue" && project.assigneeId) {
      const contact = getContact(project.assigneeId);
      if (contact) metaParts.push(`<span class="task-contact">🧑 ${esc(contact.name)}</span>`);
    }
  }
  const metaHtml = metaParts.length ? `<div class="task-meta">${metaParts.join("")}</div>` : "";

  const { done, total } = subtaskProgress(task.id);
  const expanded = !state.collapsedTasks.has(task.id);
  const chevronHtml = total > 0
    ? `<button class="task-chevron" data-action="toggle-children" aria-label="Déplier">${expanded ? "▾" : "▸"}</button>`
    : `<span class="task-chevron-spacer"></span>`;
  const progressHtml = total > 0 ? progressBarHtml(done, total) : "";
  const canAddChild = taskDepth(task) < MAX_TASK_DEPTH;
  const doneCls = task.completed ? " done" : "";

  return `
    <div class="task-row${doneCls}" data-id="${task.id}" style="--depth:${depth}">
      ${chevronHtml}
      <button class="checkbox" data-action="toggle" aria-label="Terminer"></button>
      <div class="task-body" data-action="edit">
        <div class="task-title">${esc(task.title)}</div>
        ${task.note ? `<div class="task-note">${esc(task.note)}</div>` : ""}
        ${metaHtml}
        ${progressHtml}
      </div>
      ${canAddChild ? `<button class="task-addsub" data-action="add-sub" aria-label="Ajouter une sous-tâche"><span class="plus-sm">+</span></button>` : ""}
      <button class="task-del" data-action="delete" aria-label="Supprimer">×</button>
    </div>
    <div class="task-addsub-zone" data-id="${task.id}" hidden>
      <input class="task-addsub-input" type="text" placeholder="Nouvelle sous-tâche…" autocomplete="off">
    </div>
  `;
}

// Lignes d'une tâche et de toute sa descendance dépliée (récursif), pour une seule carte.
function taskTreeRows(task, depth) {
  let html = taskRowHtml(task, depth);
  if (!state.collapsedTasks.has(task.id)) {
    childTasks(task.id).forEach(child => { html += taskTreeRows(child, depth + 1); });
  }
  return html;
}

// Carte d'une tâche racine : un seul contour qui englobe la racine ET ses sous-tâches.
// (En matrice, on n'affiche que la racine : voir le 2e argument.)
function taskCard(task, withChildren = true) {
  const li = document.createElement("li");
  li.className = "task q-" + quadrantOf(task) + (task.completed ? " done" : "");
  li.dataset.id = task.id;
  li.innerHTML = withChildren ? taskTreeRows(task, 0) : taskRowHtml(task, 0);
  return li;
}

// Affiche une liste de tâches. Mode arbre (défaut) : chaque racine est une carte qui englobe
// ses sous-tâches. Mode plat (flat=true) : chaque tâche est une carte seule (vue Aujourd'hui).
function renderTasksInto(ul, tasks, emptyHtml, flat = false) {
  ul.innerHTML = "";
  if (tasks.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.innerHTML = emptyHtml;
    ul.appendChild(empty);
    return;
  }
  tasks.forEach(t => ul.appendChild(taskCard(t, !flat)));
}

function renderList() {
  const emptyHtml = state.view === "today"
    ? `<div class="big">🎉</div>Rien de prévu aujourd'hui.`
    : `<div class="big">📭</div>Aucune tâche. Ajoute-en une ci-dessus.`;
  renderTasksInto($("taskList"), visibleTasks(), emptyHtml, state.flatList);
}

// Remplit une <ul> avec des cartes, ou un message si la liste est vide.
// Partagé par la matrice Eisenhower, le Kanban et la liste des projets terminés.
function fillColumn(ul, items, makeCard, emptyText = "—") {
  ul.innerHTML = "";
  if (items.length === 0) {
    const d = document.createElement("div");
    d.className = "col-empty";
    d.textContent = emptyText;
    ul.appendChild(d);
  } else {
    items.forEach(it => ul.appendChild(makeCard(it)));
  }
}

// Construit une matrice Eisenhower dans n'importe quel conteneur, pour une liste de tâches.
// Utilisée pour la vue globale, la matrice d'un projet, et la synthèse des projets actifs.
// opts.showAdd (défaut true) : afficher ou non le bouton "+" d'ajout par case.
function renderEisenhowerInto(board, tasks, opts = {}) {
  const showAdd = opts.showAdd !== false;
  board.innerHTML = "";
  // La matrice ne montre que les tâches racines (les sous-tâches vivent dans les listes)
  const active = tasks.filter(t => !t.completed && t.parentTaskId == null);
  QUADRANT_ORDER.forEach(key => {
    const q = QUADRANTS[key];
    const cell = document.createElement("div");
    cell.className = "eisen-cell q-" + key;
    cell.dataset.q = key;
    cell.innerHTML = `
      <div class="eisen-head"><span class="eisen-title">${q.label}</span><span class="eisen-sub">${q.desc}</span></div>
      <ul class="task-list"></ul>
      ${showAdd ? `
      <div class="eisen-add">
        <button class="eisen-add-btn" type="button"><span class="plus-sm">+</span></button>
        <input class="eisen-add-input" type="text" placeholder="Nouvelle tâche…" autocomplete="off" hidden>
      </div>` : ""}
    `;
    fillColumn(cell.querySelector(".task-list"), active.filter(t => quadrantOf(t) === key), t => taskCard(t, true));
    board.appendChild(cell);
  });
}

function renderEisenhower() {
  renderEisenhowerInto($("eisenGrid"), state.tasks);
}

// Synthèse : tâches des projets En cours et Délégué, classées par priorité.
function renderProjectsEisenhower() {
  const activeIds = state.projects
    .filter(p => p.status === "en_cours" || p.status === "delegue")
    .map(p => p.id);
  const tasks = state.tasks.filter(t => activeIds.includes(t.projectId));
  renderEisenhowerInto($("projectsEisenGrid"), tasks, { showAdd: false });
}

// Avancement d'un projet : { done, total }, sur les tâches RACINES du projet
// (une racine reflète déjà l'état de ses sous-tâches via la complétion automatique).
function projectProgress(projectId) {
  const roots = state.tasks.filter(t => t.projectId === projectId && t.parentTaskId == null);
  return { done: roots.filter(t => t.completed).length, total: roots.length };
}

/* ---- Hiérarchie des sous-tâches (parentTaskId, 3 niveaux max) ---- */
const MAX_TASK_DEPTH = 3;   // niveaux : 1 (racine) → 2 → 3

// Sous-tâches directes d'une tâche, dans l'ordre de state.tasks
function childTasks(taskId) {
  return state.tasks.filter(t => t.parentTaskId === taskId);
}

// Profondeur d'une tâche (1 = racine). Remonte la chaîne des parents.
function taskDepth(task) {
  let depth = 1, cur = task;
  while (cur && cur.parentTaskId) { cur = getTask(cur.parentTaskId); depth++; }
  return depth;
}

// Avancement d'une tâche d'après ses sous-tâches directes : { done, total }
function subtaskProgress(taskId) {
  const kids = childTasks(taskId);
  return { done: kids.filter(t => t.completed).length, total: kids.length };
}

// Coche/décoche toute la descendance d'une tâche (cascade vers le bas)
function setCompletedDeep(taskId, done) {
  childTasks(taskId).forEach(child => {
    child.completed = done;
    child.completedAt = done ? Date.now() : null;
    setCompletedDeep(child.id, done);
  });
}

// Recalcule l'état d'une tâche d'après ses enfants, puis remonte vers les parents (option c).
// Une tâche ayant des enfants est "faite" quand TOUS ses enfants directs le sont.
function refreshCompletionUpwards(taskId) {
  const task = getTask(taskId);
  if (!task) return;
  const kids = childTasks(taskId);
  if (kids.length > 0) {
    const allDone = kids.every(k => k.completed);
    task.completed = allDone;
    task.completedAt = allDone ? Date.now() : null;
  }
  if (task.parentTaskId) refreshCompletionUpwards(task.parentTaskId);
}

// Barre de progression réutilisable (projets ET tâches avec sous-tâches).
// La couleur de remplissage suit la variable --proj-color posée sur le conteneur.
function progressBarHtml(done, total) {
  const pct = Math.round((done / total) * 100);
  return `
    <div class="proj-progress">
      <div class="proj-bar"><div class="proj-bar-fill" style="width:${pct}%"></div></div>
      <span class="proj-pct">${pct}%</span>
    </div>
    <div class="proj-meta">${done}/${total} fait${done > 1 ? "s" : ""}</div>`;
}

function projectCard(project) {
  const li = document.createElement("li");
  li.className = "proj-card";
  li.dataset.id = project.id;
  // Couleur du statut, partagée par la barre de progression et le bouton "+ Tâche"
  li.style.setProperty("--proj-color", `var(--st-${project.status})`);

  const { done, total } = projectProgress(project.id);
  const progressHtml = total === 0
    ? `<div class="proj-empty">Aucune tâche</div>`
    : progressBarHtml(done, total);

  li.innerHTML = `
    <div class="proj-head">
      <span class="proj-icon">${esc(project.icon || DEFAULT_PROJECT_ICON)}</span>
      <span class="proj-name">${esc(project.name)}</span>
      <button class="proj-del" type="button" aria-label="Supprimer le projet">×</button>
    </div>
    ${progressHtml}
    <button class="proj-add" type="button"><span class="plus-sm">+</span> Tâche</button>
    <div class="proj-add-zone" hidden>
      <input class="proj-add-input" type="text" placeholder="Nouvelle tâche…" autocomplete="off">
      ${flagsHtml()}
    </div>
  `;
  return li;
}

// Liste des projets terminés (réutilise la carte projet)

/* =========================================================
   ACTIONS
   ========================================================= */
// Fabrique une tâche à partir d'un texte. flags force la priorité (sinon celle déduite du texte).
function makeTask(raw, flags, projectId = null, parentTaskId = null) {
  const parsed = parseInput(raw);
  return {
    id: uid(),
    title: parsed.title,
    note: "",
    dueDate: parsed.dueDate,
    dueTime: parsed.dueTime,
    urgent: flags ? flags.urgent : parsed.urgent,
    important: flags ? flags.important : parsed.important,
    completed: false,
    createdAt: Date.now(),
    projectId,
    parentTaskId
  };
}

/* =========================================================
   COMPOSANT « BOUTONS DE PRIORITÉ » (Important / Urgent)
   Un seul endroit qui génère le HTML, lit l'état et réinitialise.
   Réutilisé par la saisie rapide, le + Tâche d'un projet, et la vue Liste d'un projet.
   Le toggle est géré globalement (voir le listener délégué dans bindEvents).
   ========================================================= */
function flagsHtml(flags) {
  flags = flags || {};
  return `<div class="flags">
    <button class="flag${flags.important ? " on" : ""}" data-flag="important"><span class="star">★</span> Important</button>
    <button class="flag${flags.urgent ? " on" : ""}" data-flag="urgent">⚡ Urgent</button>
  </div>`;
}

// Lit l'état des boutons de priorité dans un conteneur -> { urgent, important }
function readFlags(container) {
  const on = sel => !!(container && container.querySelector(`.flag.on[data-flag="${sel}"]`));
  return { urgent: on("urgent"), important: on("important") };
}

function addTask() {
  const input = $("quickInput");
  const raw = input.value.trim();
  if (!raw) return;

  // makeTask déduit urgent/important du texte ; on y ajoute les boutons cliqués
  const flags = readFlags(document.querySelector(".quick-add"));
  const task = makeTask(raw);
  task.urgent = task.urgent || flags.urgent;
  task.important = task.important || flags.important;
  db.add(task);

  input.value = "";
  document.querySelectorAll(".quick-add .flag").forEach(f => f.classList.remove("on"));
  input.focus();
  render();
}

// Ajout depuis une case de matrice : la priorité du quadrant est imposée.
// projectId rattache la tâche à un projet (null = tâche libre).
function addTaskInQuadrant(q, raw, projectId = null) {
  db.add(makeTask(raw, QUADRANTS[q], projectId));
}

function closeEisenAdd(input) {
  input.hidden = true;
  input.value = "";
  input.closest(".eisen-add").querySelector(".eisen-add-btn").hidden = false;
}

/* ---- Projets ---- */
// Crée un projet dans la colonne (statut) donnée. Si "Délégué", on demande le contact.
function addProject(status, name) {
  const p = { id: uid(), name, icon: DEFAULT_PROJECT_ICON, status, createdAt: Date.now() };
  if (status === "delegue") {
    const contactId = pickContact();
    if (contactId === false) return;   // annulé : pas de création
    p.assigneeId = contactId;
  }
  db.addProject(p);
}

// Ajoute une tâche rattachée à un projet, avec priorité éventuelle (boutons Important/Urgent)
function addTaskToProject(projectId, raw, flags) {
  const task = makeTask(raw, null, projectId);
  if (flags) { task.urgent = task.urgent || flags.urgent; task.important = task.important || flags.important; }
  db.add(task);
}

// Supprime définitivement un projet et toutes ses tâches (après confirmation)
function deleteProject(id) {
  const p = getProject(id);
  if (!p) return;
  const n = state.tasks.filter(t => t.projectId === id).length;
  const msg = `Supprimer définitivement le projet « ${p.name} »`
    + (n ? ` et ses ${n} tâche${n > 1 ? "s" : ""} ?` : " ?");
  if (!confirm(msg)) return;
  state.tasks = state.tasks.filter(t => t.projectId !== id);  // retire les tâches du projet
  db.removeProject(id);                                        // retire le projet (et sauvegarde)
  if (state.view === "project" && state.projectId === id) navigate("projects");
  else render();
}

// Change le statut d'un projet. Si le nouveau statut est "Délégué", on demande
// à quel contact l'assigner ; sinon on retire l'assignation.
function setProjectStatus(projectId, status) {
  const changes = { status };
  if (status === "delegue") {
    const contactId = pickContact();
    if (contactId === false) return false;   // annulé : on ne change rien
    changes.assigneeId = contactId;          // peut être null (délégué sans contact précis)
  } else {
    changes.assigneeId = null;
  }
  db.updateProject(projectId, changes);
  return true;
}

// Demande de choisir un contact (par numéro) ou d'en créer un. Renvoie un id, null, ou false (annulé).
function pickContact() {
  const list = [...state.contacts].sort((a, b) => a.name.localeCompare(b.name, "fr"));
  let msg = "À quel contact déléguer ce projet ?\n\n";
  list.forEach((c, i) => { msg += `${i + 1}. ${c.name}\n`; });
  msg += `\nTape le numéro du contact, ou un nouveau nom pour créer un contact.\n(Laisse vide pour déléguer sans contact précis.)`;
  const answer = prompt(msg);
  if (answer === null) return false;                 // annulé
  const trimmed = answer.trim();
  if (trimmed === "") return null;                   // délégué sans contact
  const num = parseInt(trimmed, 10);
  if (/^\d+$/.test(trimmed) && num >= 1 && num <= list.length) {
    return list[num - 1].id;                         // contact existant choisi
  }
  const c = { id: uid(), name: trimmed, birthday: null };  // nouveau contact
  db.addContact(c);
  return c.id;
}

// Ouvre la page détaillée d'un projet
function openProject(id) {
  state.view = "project";
  state.projectId = id;
  state.projSub = "eisen";
  render();
}

// Affiche l'en-tête du projet + la sous-vue active (liste ou matrice)
function renderProjectView() {
  const p = getProject(state.projectId);
  if (!p) { navigate("projects"); return; }   // projet supprimé -> retour au Kanban

  $("projIcon").textContent = p.icon || DEFAULT_PROJECT_ICON;
  $("projName").value = p.name;

  // Remplit le sélecteur de statut (les 5 statuts, Terminé inclus)
  const sel = $("projStatus");
  sel.innerHTML = Object.keys(STATUSES)
    .map(k => `<option value="${k}">${STATUSES[k].label}</option>`).join("");
  sel.value = p.status;

  // Bouton de sous-vue actif
  document.querySelectorAll(".subview-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.sub === state.projSub));

  const tasks = state.tasks.filter(t => t.projectId === p.id);
  const listWrap = $("projListWrap");
  const eisenBoard = $("projEisenGrid");

  if (state.projSub === "eisen") {
    listWrap.style.display = "none";
    eisenBoard.style.display = "grid";
    renderEisenhowerInto(eisenBoard, tasks);
  } else {
    eisenBoard.style.display = "none";
    listWrap.style.display = "block";
    renderTasksInto($("projTaskList"), tasks.filter(t => !t.completed && t.parentTaskId == null),
      `<div class="big">📭</div>Aucune tâche dans ce projet.`);
  }
}

const MONTH_LONG = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

// Affiche un anniversaire stocké "MM-JJ" en texte lisible ("14 juillet")
function formatBirthday(bday) {
  if (!bday) return null;
  const [m, d] = bday.split("-").map(Number);
  if (!m || !d) return null;
  return d + " " + MONTH_LONG[m - 1];
}

function contactCard(contact) {
  const li = document.createElement("li");
  li.className = "contact-card";
  li.dataset.id = contact.id;

  // Projets délégués à ce contact
  const projects = state.projects.filter(p => p.status === "delegue" && p.assigneeId === contact.id);
  const bday = formatBirthday(contact.birthday);

  let projectsHtml;
  if (projects.length === 0) {
    projectsHtml = `<div class="contact-none">Aucun projet délégué</div>`;
  } else {
    projectsHtml = `<div class="contact-projects">` + projects.map(p =>
      `<div class="contact-proj" data-proj="${p.id}"><span>${esc(p.icon || DEFAULT_PROJECT_ICON)}</span> ${esc(p.name)}</div>`
    ).join("") + `</div>`;
  }

  li.innerHTML = `
    <div class="contact-head">
      <span class="contact-name">${esc(contact.name)}</span>
      <span class="contact-bday" data-action="bday">🎂 ${bday ? esc(bday) : "Ajouter"}</span>
      <input class="contact-bday-input" type="text" inputmode="numeric" maxlength="5"
             placeholder="JJ/MM" value="${contact.birthday ? esc(contact.birthday.split("-").reverse().join("/")) : ""}" hidden>
      <button class="contact-del" type="button" data-action="del" aria-label="Supprimer">×</button>
    </div>
    ${projectsHtml}
  `;
  return li;
}

function renderContacts() {
  const q = state.contactSearch.trim().toLowerCase();
  const list = [...state.contacts]
    .filter(c => !q || c.name.toLowerCase().includes(q))
    .sort((a, b) => a.name.localeCompare(b.name, "fr"));

  const ul = $("contactList");
  ul.innerHTML = "";
  if (list.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.innerHTML = q
      ? `<div class="big">🔍</div>Aucun contact trouvé.`
      : `<div class="big">🧑</div>Aucun contact. Ajoute-en un, ou délègue un projet.`;
    ul.appendChild(empty);
  } else {
    list.forEach(c => ul.appendChild(contactCard(c)));
  }
}

function toggleTask(id) {
  const t = getTask(id);
  if (!t) return;
  const done = !t.completed;
  t.completed = done;
  t.completedAt = done ? Date.now() : null;
  setCompletedDeep(id, done);            // (2) cascade : coche/décoche toute la descendance
  if (t.parentTaskId) refreshCompletionUpwards(t.parentTaskId);  // (c) remontée auto vers les parents
  db.save();
  render();
}

// Replie / déplie les sous-tâches d'une tâche
function toggleChildren(id) {
  if (state.collapsedTasks.has(id)) state.collapsedTasks.delete(id);
  else state.collapsedTasks.add(id);
  render();
}

// Ouvre le champ d'ajout de sous-tâche d'une tâche (par id)
function openSubtaskInput(taskId) {
  const wasCollapsed = state.collapsedTasks.has(taskId);
  state.collapsedTasks.delete(taskId);     // s'assurer que la tâche est dépliée
  if (wasCollapsed) render();               // re-render si on vient de déplier
  const zone = document.querySelector(`.task-addsub-zone[data-id="${taskId}"]`);
  if (!zone) return;
  zone.hidden = false;
  zone.querySelector(".task-addsub-input").focus();
}

// Crée une sous-tâche rattachée à un parent (hérite du projet du parent).
// Les sous-tâches n'ont jamais de priorité : si une sous-tâche devient urgente,
// elle a vocation à être promue en tâche racine à part entière.
function addSubtask(parentId, raw) {
  const parent = getTask(parentId);
  if (!parent || taskDepth(parent) >= MAX_TASK_DEPTH) return;
  const task = makeTask(raw, { urgent: false, important: false }, parent.projectId, parentId);
  state.tasks.push(task);
  refreshCompletionUpwards(parentId);   // le parent n'est plus "fait" s'il l'était
  db.save();
}

// Supprime une tâche et toute sa descendance (sous-tâches en cascade), puis met à jour les parents
function deleteTask(id) {
  const t = getTask(id);
  const parentId = t ? t.parentTaskId : null;
  const toRemove = new Set([id]);
  const collect = pid => childTasks(pid).forEach(c => { toRemove.add(c.id); collect(c.id); });
  collect(id);
  state.tasks = state.tasks.filter(t => !toRemove.has(t.id));
  if (parentId) refreshCompletionUpwards(parentId);
  db.save();
  render();
}

/* ---- Modal d'édition ---- */
function openEditor(id) {
  const t = getTask(id);
  if (!t) return;
  state.editingId = id;

  document.getElementById("editTitle").value = t.title;
  document.getElementById("editNote").value = t.note || "";
  document.getElementById("editDate").value = dateToInput(t);
  document.getElementById("editUrgent").classList.toggle("on", !!t.urgent);
  document.getElementById("editImportant").classList.toggle("on", !!t.important);
  document.getElementById("overlay").classList.add("open");
}

function dateToInput(t) {
  if (!t.dueDate) return "";
  const d = new Date(t.dueDate);
  let s = d.getDate() + "/" + (d.getMonth()+1) + "/" + d.getFullYear();
  if (t.dueTime) s += " " + t.dueTime;
  return s;
}

function closeEditor() {
  document.getElementById("overlay").classList.remove("open");
  state.editingId = null;
}

function saveEditor() {
  const id = state.editingId;
  if (!id) return;
  const title = document.getElementById("editTitle").value.trim();
  if (!title) return;

  const dateRaw = document.getElementById("editDate").value.trim();
  const parsed = dateRaw ? parseInput(dateRaw) : { dueDate: null, dueTime: null };

  db.update(id, {
    title,
    note: document.getElementById("editNote").value.trim(),
    dueDate: parsed.dueDate,
    dueTime: parsed.dueTime,
    urgent: document.getElementById("editUrgent").classList.contains("on"),
    important: document.getElementById("editImportant").classList.contains("on")
  });
  closeEditor();
  render();
}

/* =========================================================
   DRAG AND DROP GÉNÉRIQUE (souris + tactile)
   Un seul moteur pour la matrice Eisenhower ET le Kanban des projets.
   On l'active sur un "board" via makeDraggable(board, config) où config décrit :
     item    : sélecteur des cartes déplaçables (".task", ".proj-card")
     column  : sélecteur des colonnes (".eisen-cell", ".kanban-col")
     list    : sélecteur de la zone listée dans une colonne
     onDrop  : (carte, colonne) => applique l'attribut (priorité, statut…)
     persist : () => réordonne la collection depuis le DOM puis sauvegarde
   ========================================================= */
let drag = null;
let lastDragEnd = 0;

function makeDraggable(board, config) {
  board.addEventListener("pointerdown", e => onDragPointerDown(e, board, config));
}

// Réordonne un tableau d'objets {id} selon l'ordre des éléments affichés
function reorderFromDOM(collection, domSelector) {
  const ids = [...document.querySelectorAll(domSelector)].map(el => el.dataset.id).filter(Boolean);
  const byId = {};
  collection.forEach(o => { byId[o.id] = o; });
  const seen = new Set(ids);
  const ordered = ids.map(id => byId[id]).filter(Boolean);
  const rest = collection.filter(o => !seen.has(o.id));  // éléments non affichés (ex : tâches terminées)
  return [...ordered, ...rest];
}

function columnUnderPoint(x, y, selector) {
  const el = document.elementFromPoint(x, y);
  return el ? el.closest(selector) : null;
}

// Renvoie la carte avant laquelle insérer (ou null pour la fin de la colonne)
function insertBeforeEl(list, y, itemSelector) {
  const items = [...list.querySelectorAll(itemSelector + ":not(.dragging)")];
  for (const el of items) {
    const r = el.getBoundingClientRect();
    if (y < r.top + r.height / 2) return el;
  }
  return null;
}

function onDragPointerDown(e, board, config) {
  if (e.button != null && e.button !== 0) return;                 // clic gauche / tactile uniquement
  const itemEl = e.target.closest(config.item);
  if (!itemEl || !board.contains(itemEl)) return;
  // ne pas démarrer sur un contrôle interne (cocher, supprimer, bouton +, champ de saisie)
  if (e.target.closest("button, input, [data-action='toggle'], [data-action='delete']")) return;

  drag = {
    config, board, itemEl,
    id: itemEl.dataset.id,
    startX: e.clientX, startY: e.clientY,
    started: false, isTouch: e.pointerType === "touch", timer: null
  };

  // Mobile : appui long pour activer (sinon = défilement)
  if (drag.isTouch) drag.timer = setTimeout(() => startDrag(), 320);

  window.addEventListener("pointermove", onDragPointerMove);
  window.addEventListener("pointerup", onDragPointerUp);
  window.addEventListener("pointercancel", cancelDrag);
}

function startDrag() {
  if (!drag || drag.started) return;
  drag.started = true;

  const rect = drag.itemEl.getBoundingClientRect();
  const ghost = drag.itemEl.cloneNode(true);
  ghost.classList.add("drag-ghost");
  ghost.style.width = rect.width + "px";
  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";
  document.body.appendChild(ghost);

  drag.ghost = ghost;
  drag.offsetX = drag.startX - rect.left;
  drag.offsetY = drag.startY - rect.top;
  drag.itemEl.classList.add("dragging");
  document.body.classList.add("is-dragging");
  if (navigator.vibrate) navigator.vibrate(15);
}

function onDragPointerMove(e) {
  if (!drag) return;
  const { config } = drag;
  const dx = Math.abs(e.clientX - drag.startX);
  const dy = Math.abs(e.clientY - drag.startY);

  if (!drag.started) {
    if (drag.isTouch) {
      if (dx > 8 || dy > 8) cancelDrag();   // a bougé avant l'appui long -> défilement
    } else if (dx > 6 || dy > 6) {
      startDrag();                          // souris : seuil avant de glisser
    }
    if (!drag || !drag.started) return;
  }

  e.preventDefault();
  drag.ghost.style.left = (e.clientX - drag.offsetX) + "px";
  drag.ghost.style.top = (e.clientY - drag.offsetY) + "px";

  const col = columnUnderPoint(e.clientX, e.clientY, config.column);
  drag.board.querySelectorAll(config.column).forEach(c => c.classList.toggle("drop-target", c === col));

  // Repositionne la carte à la place visée, dans la colonne survolée
  if (col) {
    const list = col.querySelector(config.list);
    const emptyMark = list.querySelector(".col-empty");
    if (emptyMark) emptyMark.remove();
    const before = insertBeforeEl(list, e.clientY, config.item);
    if (before) list.insertBefore(drag.itemEl, before);
    else list.appendChild(drag.itemEl);
  }
}

function onDragPointerUp() {
  if (!drag) return;
  const { config } = drag;
  const wasDragging = drag.started;
  if (wasDragging) {
    const col = drag.itemEl.closest(config.column);  // colonne d'arrivée réelle
    if (col) config.onDrop(drag.itemEl, col);
    config.persist();
  }
  cleanupDrag();
  if (wasDragging) { lastDragEnd = Date.now(); render(); }
}

function cancelDrag() { cleanupDrag(); }

function cleanupDrag() {
  if (!drag) return;
  if (drag.timer) clearTimeout(drag.timer);
  if (drag.ghost) drag.ghost.remove();
  if (drag.itemEl) drag.itemEl.classList.remove("dragging");
  document.body.classList.remove("is-dragging");
  if (drag.board) drag.board.querySelectorAll(drag.config.column).forEach(c => c.classList.remove("drop-target"));
  window.removeEventListener("pointermove", onDragPointerMove);
  window.removeEventListener("pointerup", onDragPointerUp);
  window.removeEventListener("pointercancel", cancelDrag);
  drag = null;
}

function bindEvents() {
  // Ajout rapide
  document.getElementById("quickSubmit").addEventListener("click", addTask);
  // Entrée n'importe où dans la zone de saisie = ajouter (jamais activer un bouton focusé)
  document.querySelector(".quick-add").addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); addTask(); }
  });

  // Boutons de priorité (saisie rapide + vue Liste d'un projet) : toggle générique.
  // Les cartes projet du Kanban sont gérées séparément par onProjectBoardClick.
  document.querySelectorAll(".quick-add").forEach(zone => {
    zone.addEventListener("click", e => {
      const flag = e.target.closest(".flag");
      if (flag) flag.classList.toggle("on");
    });
  });

  // Tri
  document.getElementById("sortSelect").addEventListener("change", e => {
    state.sort = e.target.value;
    render();
  });

  // Navigation sidebar
  document.querySelectorAll(".nav-item[data-view]").forEach(b => {
    b.addEventListener("click", () => navigate(b.dataset.view));
  });
  document.getElementById("focusAdd").addEventListener("click", () => {
    closeSidebar();
    document.getElementById("quickInput").focus();
  });

  // Clics sur les tâches (délégation sur tout le main : liste + matrice).
  // L'id vient de la LIGNE (.task-row) car une carte racine contient plusieurs lignes.
  document.querySelector(".main").addEventListener("click", e => {
    if (Date.now() - lastDragEnd < 300) return;  // un drag vient de se terminer
    const row = e.target.closest(".task-row");
    if (!row) return;
    const id = row.dataset.id;
    const action = e.target.closest("[data-action]")?.dataset.action;
    if (action === "toggle") toggleTask(id);
    else if (action === "delete") deleteTask(id);
    else if (action === "toggle-children") toggleChildren(id);
    else if (action === "add-sub") openSubtaskInput(id);
    else if (action === "edit") openEditor(id);
  });

  // Saisie d'une sous-tâche : Entrée valide, Échap referme (pas de priorité sur les sous-tâches)
  document.querySelector(".main").addEventListener("keydown", e => {
    const input = e.target.closest(".task-addsub-input");
    if (!input) return;
    if (e.key === "Enter") {
      const parentId = input.closest(".task-addsub-zone").dataset.id;
      const raw = input.value.trim();
      if (raw) {
        addSubtask(parentId, raw);
        render();
      }
    } else if (e.key === "Escape") {
      render();
    }
  });

  // Modal
  document.getElementById("editSave").addEventListener("click", saveEditor);
  document.getElementById("editCancel").addEventListener("click", closeEditor);
  document.getElementById("editDelete").addEventListener("click", () => {
    if (state.editingId) { deleteTask(state.editingId); closeEditor(); }
  });
  document.getElementById("editUrgent").addEventListener("click", e => e.currentTarget.classList.toggle("on"));
  document.getElementById("editImportant").addEventListener("click", e => e.currentTarget.classList.toggle("on"));
  document.getElementById("overlay").addEventListener("click", e => {
    if (e.target.id === "overlay") closeEditor();
  });

  // Afficher / masquer le menu latéral
  document.getElementById("sidebarToggle").addEventListener("click", toggleSidebar);
  document.getElementById("scrim").addEventListener("click", closeSidebar);

  // Drag and drop : matrice Eisenhower (globale) et Kanban des projets
  setupEisenBoard($("eisenGrid"), () => null);          // vue globale : tâches libres
  setupEisenBoard($("projEisenGrid"), () => state.projectId); // matrice d'un projet
  setupEisenBoard($("projectsEisenGrid"), () => null, { reorder: false }); // synthèse projets actifs

  const kanban = $("kanbanBoard");
  makeDraggable(kanban, {
    item: ".proj-card", column: ".kanban-col", list: ".kanban-list",
    onDrop(itemEl, colEl) {
      const p = getProject(itemEl.dataset.id);
      if (!p) return;
      const newStatus = colEl.dataset.status;
      if (newStatus === "delegue" && p.status !== "delegue") {
        const contactId = pickContact();
        if (contactId !== false) { p.status = "delegue"; p.assigneeId = contactId; }
        // si annulé, le statut reste inchangé (la carte reviendra à sa place au prochain render)
      } else {
        p.status = newStatus;
        if (newStatus !== "delegue") p.assigneeId = null;
      }
    },
    persist() { state.projects = reorderFromDOM(state.projects, "#kanbanBoard .proj-card"); db.save(); }
  });

  // Clics et saisies sur les cartes projet : mêmes handlers pour le Kanban et la liste des terminés
  kanban.addEventListener("click", onProjectBoardClick);
  kanban.addEventListener("keydown", onProjectBoardKeydown);
  const doneList = $("projectsDone");
  doneList.addEventListener("click", onProjectBoardClick);
  doneList.addEventListener("keydown", onProjectBoardKeydown);

  // Onglets de la vue Projets : Tableau / Terminés
  $("projectsTabs").addEventListener("click", e => {
    const btn = e.target.closest(".subview-btn");
    if (btn) { state.projectsTab = btn.dataset.ptab; render(); }
  });

  // Vue détaillée d'un projet
  $("projBack").addEventListener("click", () => navigate("projects"));
  $("projName").addEventListener("change", e => {
    if (state.projectId) db.updateProject(state.projectId, { name: e.target.value.trim() || "Sans titre" });
  });
  $("projIcon").addEventListener("click", () => {
    const current = getProject(state.projectId);
    const icon = prompt("Emoji du projet :", current ? current.icon : DEFAULT_PROJECT_ICON);
    if (icon != null) { db.updateProject(state.projectId, { icon: icon.trim() || DEFAULT_PROJECT_ICON }); render(); }
  });
  $("projStatus").addEventListener("change", e => {
    if (!state.projectId) return;
    const ok = setProjectStatus(state.projectId, e.target.value);
    render();   // resynchronise le sélecteur (utile si l'assignation a été annulée)
  });
  document.querySelectorAll(".subview-btn").forEach(b => {
    b.addEventListener("click", () => { state.projSub = b.dataset.sub; render(); });
  });
  $("projTaskSubmit").addEventListener("click", addProjectTaskFromInput);
  $("projTaskInput").addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); addProjectTaskFromInput(); }
  });

  // Vue Contacts
  $("contactSearch").addEventListener("input", e => {
    state.contactSearch = e.target.value;
    renderContacts();   // on ne redessine que la liste (le champ garde le focus)
  });
  $("contactAdd").addEventListener("click", () => {
    const name = prompt("Nom du contact :");
    if (name && name.trim()) { db.addContact({ id: uid(), name: name.trim(), birthday: null }); render(); }
  });
  $("contactList").addEventListener("click", e => {
    const card = e.target.closest(".contact-card");
    if (!card) return;
    const id = card.dataset.id;
    const action = e.target.closest("[data-action]")?.dataset.action;
    const projEl = e.target.closest(".contact-proj");
    if (action === "del") {
      deleteContact(id);
    } else if (action === "bday") {
      // ouvre le champ de saisie de l'anniversaire
      const label = e.target.closest(".contact-bday");
      const input = card.querySelector(".contact-bday-input");
      label.hidden = true;
      input.hidden = false;
      input.focus();
      input.select();
    } else if (projEl) {
      openProject(projEl.dataset.proj);
    }
  });
  // Saisie de l'anniversaire : insertion auto du "/" après le jour
  $("contactList").addEventListener("input", e => {
    const input = e.target.closest(".contact-bday-input");
    if (!input) return;
    let v = input.value.replace(/[^\d]/g, "").slice(0, 4);     // ne garder que les chiffres (JJMM)
    if (v.length >= 3) v = v.slice(0, 2) + "/" + v.slice(2);   // JJ + / + MM
    input.value = v;
  });
  $("contactList").addEventListener("keydown", e => {
    const input = e.target.closest(".contact-bday-input");
    if (!input) return;
    if (e.key === "Enter") { e.preventDefault(); input.blur(); }
    else if (e.key === "Escape") { render(); }
  });
  $("contactList").addEventListener("focusout", e => {
    const input = e.target.closest(".contact-bday-input");
    if (input) saveBirthday(input.closest(".contact-card").dataset.id, input.value);
  });

  // Bascule thème clair / nuit
  document.getElementById("themeToggle").addEventListener("click", toggleTheme);
}

// Supprime un contact (les projets délégués perdent leur assignation, sans être supprimés)
function deleteContact(id) {
  const c = getContact(id);
  if (!c) return;
  if (!confirm(`Supprimer le contact « ${c.name} » ?`)) return;
  state.projects.forEach(p => { if (p.assigneeId === id) p.assigneeId = null; });
  db.removeContact(id);   // sauvegarde
  render();
}

// Enregistre l'anniversaire saisi (JJ/MM) au format stocké "MM-JJ". Vide = effacer.
function saveBirthday(id, raw) {
  const t = (raw || "").trim();
  if (t === "") { db.updateContact(id, { birthday: null }); render(); return; }
  const m = t.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (!m) { render(); return; }   // format incomplet : on annule sans rien casser
  const day = parseInt(m[1], 10), mon = parseInt(m[2], 10);
  if (day < 1 || day > 31 || mon < 1 || mon > 12) { render(); return; }
  const pad = n => String(n).padStart(2, "0");
  db.updateContact(id, { birthday: pad(mon) + "-" + pad(day) });
  render();
}

// Câble une matrice Eisenhower (drag + ajout inline par case). getProjectId rattache
// les nouvelles tâches à un projet (null pour la vue globale).
// opts.reorder (défaut true) : réordonner state.tasks selon l'ordre affiché. Désactivé
// pour la synthèse multi-projets (le drag n'y sert qu'à changer la priorité).
function setupEisenBoard(board, getProjectId, opts = {}) {
  const reorder = opts.reorder !== false;
  makeDraggable(board, {
    item: ".task", column: ".eisen-cell", list: ".task-list",
    onDrop(itemEl, colEl) {
      const flags = QUADRANTS[colEl.dataset.q];
      const t = getTask(itemEl.dataset.id);
      if (t) { t.urgent = flags.urgent; t.important = flags.important; }
    },
    persist() {
      if (reorder) state.tasks = reorderFromDOM(state.tasks, "#" + board.id + " .task");
      db.save();
    }
  });
  board.addEventListener("click", e => {
    const btn = e.target.closest(".eisen-add-btn");
    if (!btn) return;
    btn.hidden = true;
    const input = btn.closest(".eisen-add").querySelector(".eisen-add-input");
    input.hidden = false; input.focus();
  });
  board.addEventListener("keydown", e => {
    const input = e.target.closest(".eisen-add-input");
    if (!input) return;
    if (e.key === "Enter") {
      const raw = input.value.trim();
      if (raw) {
        addTaskInQuadrant(input.closest(".eisen-cell").dataset.q, raw, getProjectId());
        input.value = "";
        render();
      }
    } else if (e.key === "Escape") {
      closeEisenAdd(input);
    }
  });
  board.addEventListener("focusout", e => {
    const input = e.target.closest(".eisen-add-input");
    if (input && !input.value.trim()) closeEisenAdd(input);
  });
}

// Ajoute une tâche au projet ouvert depuis le champ de la sous-vue liste
function addProjectTaskFromInput() {
  const input = $("projTaskInput");
  const raw = input.value.trim();
  if (!raw || !state.projectId) return;
  const wrap = input.closest(".quick-add");
  addTaskToProject(state.projectId, raw, readFlags(wrap));
  input.value = "";
  wrap.querySelectorAll(".flag").forEach(f => f.classList.remove("on"));
  render();
  $("projTaskInput").focus();
}

// Clic sur une carte projet (Kanban ou liste des terminés) : supprimer, ouvrir un champ
// d'ajout (projet/tâche), basculer un bouton de priorité, ou ouvrir le projet.
function onProjectBoardClick(e) {
  if (Date.now() - lastDragEnd < 300) return;       // pas juste après un drag
  const delBtn = e.target.closest(".proj-del");
  const colAdd = e.target.closest(".col-add-btn");
  const projAdd = e.target.closest(".proj-add");
  if (delBtn) {
    deleteProject(delBtn.closest(".proj-card").dataset.id);
  } else if (colAdd) {
    colAdd.hidden = true;
    const input = colAdd.closest(".col-add").querySelector(".col-add-input");
    input.hidden = false; input.focus();
  } else if (projAdd) {
    // ouvre la zone d'ajout (champ + boutons de priorité)
    projAdd.hidden = true;
    const zone = projAdd.closest(".proj-card").querySelector(".proj-add-zone");
    zone.hidden = false;
    zone.querySelector(".proj-add-input").focus();
  } else if (e.target.closest(".flag")) {
    e.target.closest(".flag").classList.toggle("on");   // priorité dans la zone d'ajout
  } else if (!e.target.closest(".proj-add-zone")) {
    const card = e.target.closest(".proj-card");
    if (card) openProject(card.dataset.id);
  }
}

function onProjectBoardKeydown(e) {
  const input = e.target.closest(".col-add-input, .proj-add-input");
  if (!input) return;
  if (e.key === "Enter") {
    const raw = input.value.trim();
    if (!raw) return;
    if (input.classList.contains("col-add-input")) {
      addProject(input.closest(".kanban-col").dataset.status, raw);
    } else {
      const flags = readFlags(input.closest(".proj-add-zone"));
      addTaskToProject(input.closest(".proj-card").dataset.id, raw, flags);
    }
    render();
  } else if (e.key === "Escape") {
    render();   // referme les champs en redessinant
  }
}

/* =========================================================
   THÈME CLAIR / NUIT
   ========================================================= */
function setTheme(dark) {
  document.body.classList.toggle("dark", dark);
  document.getElementById("themeToggle").textContent = dark ? "☀️" : "🌙";
  localStorage.setItem(THEME_KEY, dark ? "dark" : "light");
}
function initTheme() {
  setTheme(localStorage.getItem(THEME_KEY) === "dark");
}
function toggleTheme() {
  setTheme(!document.body.classList.contains("dark"));
}

/* =========================================================
   INIT
   ========================================================= */
function init() {
  db.load();
  applyMode();
  bindEvents();
  initTheme();
  render();
}
init();
</script>

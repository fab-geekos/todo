<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Todo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa;
    --text: #2C3E50;
    --accent: #4A6FA5;
    --success: #2D936C;
    --alert: #E07A5F;
    --warning: #F2CC8F;
    --muted: #888;
    --card: #fff;
    --border: #ececec;
    --hover: #fcfcfc;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);

    /* Quadrants Eisenhower */
    --q-faire: #E07A5F;      /* Important + Urgent */
    --q-planifier: #D9A441;  /* Important, pas urgent */
    --q-deleguer: #4A6FA5;   /* Urgent, pas important */
    --q-eliminer: #9aa3ad;   /* Ni l'un ni l'autre */

    --star: #F2B705;         /* étoile "Important" */

    /* Statuts de projet (Kanban) */
    --st-pas_commence: #E8924A;
    --st-en_cours:     #4A6FA5;
    --st-en_pause:     #C9637E;
    --st-delegue:      #9B7EBD;
    --st-termine:      #2D936C;
  }

  /* Mode nuit (thème des quiz capitales) */
  body.dark {
    --bg: #0b1120;
    --text: #e2e8f0;
    --card: #131b2e;
    --muted: #64748b;
    --border: #1e293b;
    --hover: #1a2438;
    --shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  body.dark .field input, body.dark .field textarea { background: var(--card); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== LAYOUT ===== */
  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: var(--card);
    border-right: 1px solid var(--border);
    padding: 64px 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }
  /* Liste des vues : occupe la hauteur restante et défile si besoin */
  .nav-scroll {
    flex: 1; min-height: 0; overflow-y: auto;
    display: flex; flex-direction: column; gap: 4px;
    margin: 0 -14px; padding: 0 14px;
  }

  .main {
    flex: 1;
    padding: 40px 48px;
    width: 100%;
    min-width: 0;
  }

  /* ===== SIDEBAR ===== */
  .add-btn {
    display: flex; align-items: center; gap: 10px;
    background: none; border: none; cursor: pointer;
    color: var(--alert); font-family: inherit; font-size: 16px; font-weight: 600;
    padding: 10px 12px; border-radius: var(--radius);
    transition: background .2s;
    width: 100%; text-align: left;
  }
  .add-btn:hover { background: rgba(224,122,95,.08); }
  .add-btn .plus {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--alert); color: #fff;
    display: grid; place-items: center; font-size: 18px; line-height: 1;
  }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 12px; border-radius: var(--radius);
    cursor: pointer; color: var(--text); font-size: 15px;
    transition: background .2s; border: none; background: none;
    font-family: inherit; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(74,111,165,.07); }
  .nav-item.active { background: rgba(224,122,95,.1); color: var(--alert); font-weight: 600; }
  .nav-item .icon { font-size: 18px; width: 22px; text-align: center; }
  .nav-item .count { margin-left: auto; color: var(--muted); font-size: 13px; }
  .nav-item.soon { color: var(--muted); cursor: default; }
  .nav-item.soon:hover { background: none; }
  .nav-item.soon .count { font-size: 11px; font-style: italic; }

  .nav-sep { height: 1px; background: var(--border); margin: 12px 4px; }

  /* ===== MAIN ===== */
  .main-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 24px; }
  .main-head .titles { flex: 1; min-width: 0; }
  .view-title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .view-sub { color: var(--muted); font-size: 14px; }
  .head-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .icon-btn {
    background: var(--card); border: 1px solid var(--border); border-radius: 50%;
    width: 40px; height: 40px; cursor: pointer; font-size: 18px; color: var(--text);
    flex-shrink: 0; transition: background .2s; box-shadow: var(--shadow);
    display: grid; place-items: center;
  }
  .icon-btn:hover { background: var(--hover); }

  .toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 18px; flex-wrap: wrap;
  }
  .sort-select {
    font-family: inherit; font-size: 13px; color: var(--text);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 6px 10px; background: var(--card); cursor: pointer;
  }

  /* ===== QUICK ADD ===== */
  .quick-add { margin-bottom: 22px; }
  .quick-add-row { display: flex; gap: 8px; align-items: center; }
  .quick-input {
    flex: 1; font-family: inherit; font-size: 15px; color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; background: var(--card); outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .quick-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(74,111,165,.12); }
  .quick-submit {
    font-family: inherit; font-size: 15px; font-weight: 600; color: #fff;
    background: var(--accent); border: none; border-radius: var(--radius);
    padding: 12px 18px; cursor: pointer; transition: opacity .2s;
    white-space: nowrap;
  }
  .quick-submit:hover { opacity: .9; }
  .flags { display: flex; gap: 8px; margin-top: 10px; padding-left: 2px; }
  .flag {
    font-family: inherit; font-size: 13px; cursor: pointer;
    border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 12px; background: var(--card); color: var(--muted);
    transition: all .2s; user-select: none;
  }
  .flag.on[data-flag="urgent"] { background: var(--alert); color: #fff; border-color: var(--alert); }
  .flag.on[data-flag="important"] { background: var(--accent); color: #fff; border-color: var(--accent); }
  .flag .star { color: var(--star); }

  /* ===== TASK LIST ===== */
  .task-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }

  /* Carte = UN SEUL contour par tâche racine (englobe ses sous-tâches) */
  .task {
    border-radius: var(--radius);
    border-left: 3px solid transparent;
    background: var(--card); box-shadow: var(--shadow);
    animation: fadeUp .25s ease; overflow: hidden;
  }
  .task.q-faire { border-left-color: var(--q-faire); }
  .task.q-planifier { border-left-color: var(--q-planifier); }
  .task.q-deleguer { border-left-color: var(--q-deleguer); }
  .task.q-eliminer { border-left-color: var(--q-eliminer); }

  /* Une ligne (racine ou sous-tâche) à l'intérieur de la carte */
  .task-row {
    display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px;
    cursor: pointer; transition: background .15s;
    padding-left: calc(14px + var(--depth, 0) * 22px);   /* indentation des sous-tâches */
  }
  .task-row:hover { background-color: var(--hover); }
  /* Méthode b — connecteurs en arbre. Verticales d'ancêtres : posées en fond (inline, calculées au rendu). */
  .task-row[style*="--depth:1"], .task-row[style*="--depth:2"], .task-row[style*="--depth:3"] {
    position: relative; background-repeat: no-repeat;
  }
  /* Branche propre de la ligne : verticale (::before) + connecteur horizontal (::after) */
  .task-row[style*="--depth:1"]::before, .task-row[style*="--depth:2"]::before, .task-row[style*="--depth:3"]::before {
    content: ""; position: absolute; top: 0; bottom: 0; width: 2px; border-radius: 2px;
    left: calc(8px + (var(--depth) - 1) * 22px); background: var(--border);
  }
  /* Dernière sous-tâche d'un groupe : la verticale s'arrête au coude -> "└" */
  .task-row.task-last::before { bottom: auto; height: 25px; }
  .task-row[style*="--depth:1"]::after, .task-row[style*="--depth:2"]::after, .task-row[style*="--depth:3"]::after {
    content: ""; position: absolute; top: 23px; height: 2px; width: 24px; border-radius: 2px;
    left: calc(8px + (var(--depth) - 1) * 22px); background: var(--border);
  }

  .task-chevron, .task-chevron-spacer {
    width: 18px; flex-shrink: 0; margin-top: 2px;
    background: none; border: none; cursor: pointer; padding: 0;
    color: var(--muted); font-size: 12px; text-align: center; line-height: 20px;
  }
  .task-chevron:hover { color: var(--text); }

  .checkbox {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--muted); cursor: pointer; margin-top: 2px;
    transition: all .2s; background: none; position: relative;
  }
  /* Le contour coloré (priorité) ne s'applique qu'aux racines (depth 0) */
  .task.q-faire .task-row[style*="--depth:0"] .checkbox { border-color: var(--q-faire); }
  .task.q-planifier .task-row[style*="--depth:0"] .checkbox { border-color: var(--q-planifier); }
  .task.q-deleguer .task-row[style*="--depth:0"] .checkbox { border-color: var(--q-deleguer); }
  .checkbox:hover { transform: scale(1.1); }
  .checkbox::after {
    content: '✓'; position: absolute; inset: 0; display: grid; place-items: center;
    color: #fff; font-size: 12px; opacity: 0; transition: opacity .15s;
  }
  .task-row.done .checkbox { background: var(--success); border-color: var(--success); }
  .task-row.done .checkbox::after { opacity: 1; }

  .task-body { flex: 1; min-width: 0; }
  .task-titleline { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .task-title { font-size: 15px; font-weight: 600; word-break: break-word; min-width: 0; }
  .task-row.done .task-title { text-decoration: line-through; color: var(--muted); }
  /* Hiérarchie typographique : la profondeur réduit taille et graisse */
  .task-row[style*="--depth:1"] .task-title { font-size: 14px; font-weight: 500; }
  .task-row[style*="--depth:2"] .task-title,
  .task-row[style*="--depth:3"] .task-title { font-size: 13px; font-weight: 400; color: var(--muted); }
  /* Badge compact X/Y (liste + fenêtre d'édition) */
  .count-badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 11px; font-weight: 600; color: var(--muted);
    background: var(--hover); border: 1px solid var(--border);
    border-radius: 8px; padding: 1px 7px; white-space: nowrap; flex-shrink: 0;
  }
  .task-note { font-size: 13px; color: var(--muted); margin-top: 2px; word-break: break-word; }
  .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 5px; flex-wrap: wrap; }
  .task-body .proj-progress { margin-top: 7px; max-width: 240px; }
  .due, .task-project, .task-contact, .task-recur {
    font-size: 12px; color: var(--muted);
    display: inline-flex; align-items: center; gap: 4px;
  }
  .due.today { color: var(--success); font-weight: 500; }
  .due.overdue { color: var(--alert); font-weight: 500; }
  .due.inherited { color: var(--muted); font-style: italic; opacity: .8; }

  .task-addsub {
    opacity: 0; background: none; border: none; cursor: pointer;
    align-self: center; padding: 0 4px; flex-shrink: 0; transition: opacity .2s;
  }
  .task-addsub .plus-sm { font-size: 16px; font-weight: 600; line-height: 1; color: var(--accent); }
  .task-row:hover .task-addsub { opacity: 1; }
  .task-addsub-zone { padding: 0 14px 12px calc(48px + var(--depth, 0) * 22px); }
  .task-addsub-input {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text);
    border: 1px solid var(--accent); border-radius: 8px; padding: 8px 10px;
    background: var(--card); outline: none;
  }

  .task-del {
    opacity: 0; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 18px; padding: 0 4px; align-self: center;
    transition: opacity .2s, color .2s;
  }
  .task-row:hover .task-del { opacity: 1; }
  .task-del:hover { color: var(--alert); }

  .empty {
    text-align: center; color: var(--muted); padding: 60px 20px; font-size: 15px;
  }
  .empty .big { font-size: 40px; margin-bottom: 12px; }

  /* ===== MATRICE EISENHOWER ===== */
  .eisen-grid { display: none; grid-template-columns: 1fr 1fr; gap: 14px; }
  .eisen-cell {
    background: var(--card); border: 1px solid var(--border);
    border-top: 3px solid var(--muted); border-radius: var(--radius);
    padding: 14px; box-shadow: var(--shadow);
  }
  .eisen-cell.q-faire { border-top-color: var(--q-faire); }
  .eisen-cell.q-planifier { border-top-color: var(--q-planifier); }
  .eisen-cell.q-deleguer { border-top-color: var(--q-deleguer); }
  .eisen-cell.q-eliminer { border-top-color: var(--q-eliminer); }
  .eisen-head { display: flex; flex-direction: column; margin-bottom: 8px; }
  .eisen-title { font-weight: 600; font-size: 15px; }
  .eisen-sub { font-size: 12px; color: var(--muted); }
  .eisen-cell .task { box-shadow: none; background: transparent; border-left-color: transparent; }
  .eisen-cell .task-row { padding: 8px 6px; }
  .eisen-cell .task-row:hover { background: rgba(0,0,0,.03); }
  body.dark .eisen-cell .task-row:hover { background: rgba(255,255,255,.04); }
  .col-empty { color: var(--muted); font-size: 13px; padding: 6px; }
  .eisen-add { margin-top: 6px; }
  .eisen-add-btn {
    display: flex; align-items: center; width: 100%;
    background: none; border: none; cursor: pointer;
    font-family: inherit; padding: 6px; border-radius: 8px;
    transition: background .15s;
  }
  .eisen-add-btn:hover { background: rgba(0,0,0,.03); }
  body.dark .eisen-add-btn:hover { background: rgba(255,255,255,.04); }
  .eisen-add-btn .plus-sm { font-size: 20px; font-weight: 600; line-height: 1; }
  .q-faire     .plus-sm { color: var(--q-faire); }
  .q-planifier .plus-sm { color: var(--q-planifier); }
  .q-deleguer  .plus-sm { color: var(--q-deleguer); }
  .q-eliminer  .plus-sm { color: var(--q-eliminer); }
  .eisen-add-input {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text);
    border: 1px solid var(--accent); border-radius: 8px; padding: 9px 10px;
    background: var(--card); outline: none;
  }

  /* ===== DRAG AND DROP (matrice) ===== */
  .eisen-cell .task { cursor: grab; touch-action: pan-y; }
  .task.dragging { opacity: .35; pointer-events: none; }
  .drag-ghost {
    position: fixed; z-index: 100; pointer-events: none;
    opacity: .95; border-radius: var(--radius); background: var(--card);
    box-shadow: 0 10px 28px rgba(0,0,0,.28); padding: 8px 10px;
    transform: rotate(1.5deg);
  }
  .task.drag-ghost { padding: 12px 14px; }
  .eisen-cell.drop-target {
    background: rgba(74,111,165,.08);
    outline: 2px dashed var(--accent); outline-offset: -2px;
  }
  body.is-dragging { cursor: grabbing; user-select: none; touch-action: none; overflow: hidden; }

  /* ===== KANBAN PROJETS ===== */
  .kanban-board { display: none; gap: 14px; align-items: flex-start; overflow-x: auto; padding-bottom: 8px; }
  .kanban-col {
    flex: 1 1 0; min-width: 240px;
    background: var(--card); border: 1px solid var(--border);
    border-top: 3px solid var(--muted); border-radius: var(--radius);
    padding: 14px; box-shadow: var(--shadow);
  }
  .kanban-col.st-pas_commence { border-top-color: var(--st-pas_commence); }
  .kanban-col.st-en_cours { border-top-color: var(--st-en_cours); }
  .kanban-col.st-en_pause { border-top-color: var(--st-en_pause); }
  .kanban-col.st-delegue { border-top-color: var(--st-delegue); }
  .kanban-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .kanban-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .st-pas_commence .kanban-dot { background: var(--st-pas_commence); }
  .st-en_cours .kanban-dot { background: var(--st-en_cours); }
  .st-en_pause .kanban-dot { background: var(--st-en_pause); }
  .st-delegue .kanban-dot { background: var(--st-delegue); }
  .kanban-title { font-weight: 600; font-size: 14px; }
  .kanban-count { color: var(--muted); font-size: 13px; }
  .kanban-list { list-style: none; display: flex; flex-direction: column; gap: 8px; min-height: 8px; }

  .projects-tabs { display: none; gap: 8px; margin-bottom: 18px; }
  #projectsPriorities { display: none; margin-top: 32px; }
  .section-title { font-size: 18px; font-weight: 700; margin-bottom: 2px; }
  .section-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
  .done-list { display: none; list-style: none; flex-direction: column; gap: 10px; max-width: 560px; }
  .done-list .proj-card { cursor: pointer; }
  .done-list .proj-add, .done-list .proj-add-zone { display: none; }  /* pas d'ajout de tâche sur un projet terminé */

  .proj-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px; cursor: grab; touch-action: pan-y; transition: background .15s;
  }
  .proj-card:hover { border-color: var(--accent); }
  .proj-card.dragging { opacity: .35; pointer-events: none; }
  .proj-head { display: flex; align-items: center; gap: 8px; }
  .proj-icon { font-size: 18px; flex-shrink: 0; }
  .proj-name { font-weight: 600; font-size: 15px; word-break: break-word; flex: 1; }
  .proj-del {
    opacity: 0; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 18px; line-height: 1; padding: 0 2px;
    flex-shrink: 0; transition: opacity .2s, color .2s;
  }
  .proj-card:hover .proj-del { opacity: 1; }
  .proj-del:hover { color: var(--alert); }
  .proj-meta { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .proj-empty { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }
  .proj-progress {
    display: flex; align-items: center; gap: 8px; margin-top: 8px;
  }
  .proj-bar {
    flex: 1; height: 7px; border-radius: 4px; background: var(--border); overflow: hidden;
  }
  .proj-bar-fill {
    height: 100%; border-radius: 4px; background: var(--proj-color, var(--muted)); transition: width .3s ease;
  }
  .proj-pct { font-size: 12px; color: var(--muted); font-weight: 600; flex-shrink: 0; min-width: 32px; text-align: right; }
  .proj-add {
    display: flex; align-items: center; gap: 6px; width: 100%; margin-top: 8px;
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-family: inherit; font-size: 13px; padding: 4px; border-radius: 8px;
    transition: color .15s;
  }
  .proj-add:hover { color: var(--accent); }
  .proj-add .plus-sm { font-size: 16px; font-weight: 600; line-height: 1; color: var(--proj-color, var(--accent)); }

  .col-add { margin-top: 10px; }
  .col-add-btn {
    display: flex; align-items: center; gap: 6px; width: 100%;
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-family: inherit; font-size: 14px; padding: 6px; border-radius: 8px;
    transition: color .15s;
  }
  .col-add-btn:hover { color: var(--accent); }
  .col-add-btn .plus-sm { font-size: 18px; font-weight: 600; line-height: 1; }
  .st-pas_commence .col-add-btn .plus-sm { color: var(--st-pas_commence); }
  .st-delegue .col-add-btn .plus-sm { color: var(--st-delegue); }
  .col-add-input, .proj-add-input {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text);
    border: 1px solid var(--accent); border-radius: 8px; padding: 9px 10px;
    background: var(--card); outline: none; margin-top: 6px;
  }
  .proj-add-zone .flags { gap: 6px; margin-top: 8px; }
  .proj-add-zone .flag { font-size: 12px; padding: 4px 10px; }

  /* ===== VUE DÉTAILLÉE D'UN PROJET ===== */
  .project-view { display: none; }
  .proj-detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; flex-wrap: wrap; }
  .proj-detail-icon {
    font-size: 26px; background: none; border: none; cursor: pointer;
    border-radius: 10px; padding: 2px 6px; line-height: 1; transition: background .2s;
  }
  .proj-detail-icon:hover { background: var(--bg); }
  .proj-detail-name {
    flex: 1; min-width: 160px; font-family: inherit; font-size: 22px; font-weight: 700;
    color: var(--text); border: none; background: none; outline: none;
    border-bottom: 2px solid transparent; padding: 2px 0;
  }
  .proj-detail-name:focus { border-bottom-color: var(--accent); }
  .proj-status-select {
    font-family: inherit; font-size: 14px; color: var(--text); cursor: pointer;
    border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; background: var(--card);
  }
  .proj-subviews { display: flex; gap: 8px; margin-bottom: 18px; }
  .subview-btn {
    font-family: inherit; font-size: 14px; cursor: pointer; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px; padding: 7px 16px;
    background: var(--card); transition: all .2s;
  }
  .subview-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #projListWrap .quick-add-row { margin-bottom: 14px; }

  /* ===== VUE CONTACTS ===== */
  .contacts-view { display: none; }
  .contacts-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
  .search-box { flex: 1; position: relative; display: flex; align-items: center; }
  .search-icon { position: absolute; left: 12px; font-size: 14px; opacity: .6; pointer-events: none; }
  .search-input {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px 11px 38px;
    background: var(--card); outline: none; transition: border-color .2s, box-shadow .2s;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(74,111,165,.12); }

  .contact-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .contact-card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; box-shadow: var(--shadow);
  }
  .contact-head { display: flex; align-items: center; gap: 10px; }
  .contact-name { font-weight: 600; font-size: 16px; flex: 1; word-break: break-word; }
  .contact-bday {
    font-size: 13px; color: var(--muted); display: inline-flex; align-items: center; gap: 4px;
    cursor: pointer; border-radius: 8px; padding: 2px 6px; transition: background .15s;
  }
  .contact-bday:hover { background: var(--bg); }
  .contact-bday-input {
    width: 70px; font-family: inherit; font-size: 13px; color: var(--text);
    border: 1px solid var(--accent); border-radius: 8px; padding: 4px 8px;
    background: var(--card); outline: none; text-align: center;
  }
  .contact-del {
    opacity: 0; background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 18px; line-height: 1; padding: 0 2px; transition: opacity .2s, color .2s;
  }
  .contact-card:hover .contact-del { opacity: 1; }
  .contact-del:hover { color: var(--alert); }
  .contact-projects { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .contact-proj {
    font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px;
    cursor: pointer; padding: 4px 6px; border-radius: 8px; transition: background .15s;
  }
  .contact-proj:hover { background: var(--bg); }
  .contact-none { font-size: 13px; color: var(--muted); margin-top: 6px; font-style: italic; }

  /* ===== MODAL ÉDITION ===== */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.35);
    display: none; place-items: center; padding: 20px; z-index: 50;
  }
  .overlay.open { display: grid; }

  /* ===== FENÊTRE D'ÉDITION (deux colonnes, façon Todoist) ===== */
  .editor {
    background: var(--card); border-radius: var(--radius);
    width: 100%; max-width: 840px; max-height: 88vh; overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,.2); animation: fadeUp .2s ease;
    display: flex; flex-direction: column;
  }
  .editor-top {
    display: flex; align-items: center; justify-content: flex-end;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .editor-close {
    background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 22px; line-height: 1; padding: 4px 8px; border-radius: 8px; transition: background .15s;
  }
  .editor-close:hover { background: var(--hover); }
  .editor-cols { display: flex; min-height: 0; overflow: hidden; }
  .editor-main { flex: 1; padding: 22px 24px; overflow-y: auto; min-width: 0; }
  .editor-breadcrumb {
    display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
    font-size: 13px; color: var(--muted); margin-bottom: 14px;
  }
  .editor-crumb {
    background: none; border: none; cursor: pointer; font-family: inherit; font-size: 13px;
    color: var(--muted); padding: 2px 6px; border-radius: 6px; transition: background .15s, color .15s;
    max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .editor-crumb:hover { background: var(--hover); color: var(--accent); }
  .editor-crumb-sep { color: var(--muted); }
  .editor-side {
    width: 280px; flex-shrink: 0; background: var(--bg);
    padding: 20px; overflow-y: auto; border-left: 1px solid var(--border);
  }

  .editor-title {
    width: 100%; font-family: inherit; font-size: 20px; font-weight: 700; color: var(--text);
    border: none; background: none; outline: none; padding: 0; margin-bottom: 8px;
  }
  .editor-desc {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text);
    border: none; background: none; outline: none; padding: 0; resize: vertical; min-height: 24px;
  }
  .editor-desc::placeholder, .editor-title::placeholder { color: var(--muted); }

  .editor-subtasks { margin-top: 22px; border-top: 1px solid var(--border); padding-top: 14px; }
  .editor-subtasks-head { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
  .editor-sub-list { list-style: none; display: flex; flex-direction: column; }
  .editor-sub {
    display: flex; align-items: center; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .editor-sub .checkbox { margin-top: 0; }
  .editor-sub-body { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; flex-wrap: wrap; }
  .editor-sub-title { font-size: 14px; word-break: break-word; }
  .editor-sub.done .editor-sub-title { text-decoration: line-through; color: var(--muted); }
  .editor-sub-del {
    opacity: 0; background: none; border: none; cursor: pointer; color: var(--muted);
    font-size: 16px; padding: 0 4px; transition: opacity .2s, color .2s;
  }
  .editor-sub:hover .editor-sub-del { opacity: 1; }
  .editor-sub-del:hover { color: var(--alert); }
  .editor-addsub {
    display: flex; align-items: center; gap: 8px; padding: 10px 0; cursor: pointer; color: var(--muted);
  }
  .editor-addsub:hover { color: var(--accent); }
  .editor-addsub-input {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text); margin-top: 8px;
    border: 1px solid var(--accent); border-radius: 8px; padding: 8px 10px; background: var(--card); outline: none;
  }

  /* Sections du panneau de droite */
  .side-section { margin-bottom: 18px; }
  .side-section.muted-soon { opacity: .5; pointer-events: none; }
  .side-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .side-label .soon-tag { font-size: 11px; font-weight: 400; color: var(--muted); font-style: italic; }
  .side-date-input {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; background: var(--card); outline: none;
  }
  .side-date-input:focus { border-color: var(--accent); }
  .recur-select, .recur-num, .recur-unit {
    font-family: inherit; font-size: 14px; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    background: var(--card); outline: none;
  }
  .recur-select { width: 100%; cursor: pointer; }
  .recur-select:focus, .recur-num:focus, .recur-unit:focus { border-color: var(--accent); }
  .recur-hint { font-size: 12px; color: var(--muted); font-style: italic; }
  .recur-custom { margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
  .recur-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .recur-num { width: 60px; text-align: center; }
  .recur-unit { flex: 1; min-width: 90px; cursor: pointer; }
  .recur-days { display: flex; gap: 4px; flex-wrap: wrap; }
  .recur-day {
    width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); cursor: pointer; font-size: 13px; font-family: inherit;
    transition: background .15s, color .15s, border-color .15s;
  }
  .recur-day.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .recur-mode { display: flex; flex-direction: column; gap: 6px; }
  .recur-mode label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text); cursor: pointer; }
  .recur-nth { display: flex; gap: 6px; }
  .recur-nth select { flex: 1; }
  .editor .flags { gap: 8px; }
  .editor-delete {
    margin-top: 8px; background: none; border: none; cursor: pointer; color: var(--alert);
    font-size: 14px; font-family: inherit; padding: 6px 0; display: inline-flex; align-items: center; gap: 6px;
  }
  .editor-delete:hover { text-decoration: underline; }

  /* ===== COMPOSANT DÉROULANT AVEC RECHERCHE (générique) ===== */
  .picker { position: relative; }
  .picker-trigger {
    width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 8px;
    font-family: inherit; font-size: 14px; color: var(--text); cursor: pointer;
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; background: var(--card);
    transition: border-color .15s;
  }
  .picker-trigger:hover { border-color: var(--accent); }
  .picker-trigger .picker-caret { color: var(--muted); font-size: 11px; flex-shrink: 0; }
  .picker-value { display: inline-flex; align-items: center; gap: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .picker-panel {
    position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 5;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.18); padding: 8px; max-height: 260px; overflow-y: auto;
  }
  .picker-search {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; background: var(--card);
    outline: none; margin-bottom: 6px;
  }
  .picker-search:focus { border-color: var(--accent); }
  .picker-option {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px;
    cursor: pointer; font-size: 14px; color: var(--text); transition: background .12s;
  }
  .picker-option:hover { background: var(--hover); }
  .picker-option.selected { background: var(--hover); }
  .picker-option .check { margin-left: auto; color: var(--success); }
  .picker-empty { padding: 10px; color: var(--muted); font-size: 13px; text-align: center; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
  .field input, .field textarea {
    width: 100%; font-family: inherit; font-size: 15px; color: var(--text);
    border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    outline: none; transition: border-color .2s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 60px; }
  .btn {
    font-family: inherit; font-size: 15px; font-weight: 600; cursor: pointer;
    border-radius: var(--radius); padding: 10px 18px; border: none; transition: opacity .2s;
  }
  .btn:hover { opacity: .9; }
  .btn-primary { background: var(--accent); color: #fff; flex: 1; }
  .btn-ghost { background: none; color: var(--muted); border: 1px solid var(--border); }
  .btn-danger { background: none; color: var(--alert); border: 1px solid var(--alert); }

  /* ===== BURGER MOBILE ===== */
  .scrim { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 30; }
  .menu-btn {
    position: fixed; top: 14px; left: 14px; z-index: 60;
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    width: 42px; height: 42px; cursor: pointer; font-size: 20px; color: var(--text);
    box-shadow: var(--shadow); display: grid; place-items: center; transition: background .2s;
  }
  .menu-btn:hover { background: var(--hover); }
  /* Desktop : repli de la sidebar */
  @media (min-width: 721px) {
    body.sidebar-hidden .sidebar { display: none; }
    body.sidebar-hidden .main { padding-left: 72px; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== VUE SEMAINE (Prochainement) ===== */
  .week-view { display: none; }
  .week-bar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .week-month { font-size: 18px; font-weight: 600; color: var(--text); }
  .week-nav { display: flex; align-items: center; gap: 6px; }
  .week-nav-btn, .week-today-btn {
    font-family: inherit; font-size: 14px; color: var(--text);
    border: 1px solid var(--border); background: var(--card);
    border-radius: 10px; cursor: pointer; transition: background .15s, border-color .15s;
  }
  .week-nav-btn { width: 34px; height: 34px; font-size: 18px; line-height: 1; }
  .week-today-btn { padding: 0 14px; height: 34px; font-weight: 600; }
  .week-nav-btn:hover, .week-today-btn:hover { background: var(--hover); border-color: var(--accent); }

  .week-grid { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; align-items: flex-start; }
  .week-col {
    flex: 0 0 260px; min-width: 260px;
    border-top: 2px solid var(--border); padding-top: 10px;
  }
  .week-col.today { border-top-color: var(--accent); }
  .week-col-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .week-col-date { font-size: 14px; font-weight: 600; color: var(--text); }
  .week-col.today .week-col-date { color: var(--alert); }
  .week-col-wd { font-size: 13px; color: var(--muted); }
  .week-col-count { margin-left: auto; font-size: 12px; color: var(--muted); }
  .week-task {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 8px; overflow: hidden;
  }
  /* Glisser-déposer dans les vues agenda (Aujourd'hui & Prochainement) */
  .agenda-drag { cursor: grab; }
  body.is-dragging .agenda-drag { cursor: grabbing; }
  .week-task.dragging { opacity: .35; pointer-events: none; }
  .week-task.drag-ghost { margin: 0; }
  .week-col.drop-target { background: var(--hover); border-radius: 12px; }
  .week-list { min-height: 8px; }
  .week-col .task-row { padding-top: 10px; padding-bottom: 10px; }
  .week-col .task-row:hover { background: var(--hover); }
  .week-empty { font-size: 13px; color: var(--muted); font-style: italic; padding: 4px 2px; }
  .week-add { margin-top: 2px; }
  .week-add-btn {
    font-family: inherit; font-size: 13px; color: var(--muted);
    background: none; border: none; cursor: pointer; padding: 6px 4px;
    display: inline-flex; align-items: center; gap: 6px; border-radius: 8px;
  }
  .week-add-btn:hover { color: var(--accent); }
  .week-add-btn .plus-sm { font-size: 16px; font-weight: 600; }

  /* Pop-up d'ajout de tâche (Prochainement) */
  .week-modal-scrim {
    position: fixed; inset: 0; z-index: 60;
    background: rgba(0,0,0,.32);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 14vh 16px 16px;
  }
  .week-modal-scrim[hidden] { display: none; }   /* l'attribut hidden doit l'emporter sur display:flex */
  .week-modal {
    width: 100%; max-width: 440px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: 0 12px 40px rgba(0,0,0,.18);
    padding: 16px; display: flex; flex-direction: column; gap: 12px;
    animation: fadeUp .18s ease;
  }
  .week-modal-input {
    font-family: inherit; font-size: 16px; font-weight: 600; color: var(--text);
    border: none; outline: none; background: none; padding: 2px 0;
  }
  .week-modal-input::placeholder { color: var(--muted); font-weight: 500; }
  .week-modal-day {
    display: inline-flex; align-items: center; gap: 6px; align-self: flex-start;
    font-size: 13px; color: var(--success); font-weight: 500;
    border: 1px solid var(--border); border-radius: 8px; padding: 4px 10px;
  }
  .week-modal .flags { display: flex; gap: 8px; flex-wrap: wrap; }
  .week-modal-foot {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    border-top: 1px solid var(--border); padding-top: 12px; flex-wrap: wrap;
  }
  .week-modal-inbox { font-size: 13px; color: var(--muted); display: inline-flex; align-items: center; gap: 6px; }
  .week-modal-actions { display: flex; gap: 8px; }
  .week-modal-cancel, .week-modal-add {
    font-family: inherit; font-size: 14px; cursor: pointer;
    border-radius: 10px; padding: 8px 16px; border: 1px solid var(--border);
    transition: background .15s, border-color .15s, opacity .15s;
  }
  .week-modal-cancel { background: var(--card); color: var(--muted); }
  .week-modal-cancel:hover { background: var(--hover); }
  .week-modal-add { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
  .week-modal-add:hover { opacity: .9; }
  .week-bday {
    display: flex; flex-direction: column; gap: 3px; padding: 10px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 8px; font-size: 14px; color: var(--text);
  }
  .week-bday-main { display: flex; align-items: center; gap: 8px; }
  .week-bday-note { font-size: 12px; color: var(--muted); font-style: italic; }
  .week-late {
    display: inline-flex; align-items: center; font-size: 11px; font-weight: 600;
    color: var(--alert); border: 1px solid var(--alert); border-radius: 8px;
    padding: 0 6px; margin-left: 4px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 720px) {
    .sidebar {
      position: fixed; left: 0; top: 0; z-index: 35;
      transform: translateX(-100%); transition: transform .25s ease;
      box-shadow: 2px 0 12px rgba(0,0,0,.1);
    }
    .sidebar.open { transform: translateX(0); }
    .scrim.open { display: block; }
    .main { padding: 70px 18px 40px; }
    .view-title { font-size: 24px; }
    .quick-submit { padding: 12px 14px; }
    .eisen-grid { grid-template-columns: 1fr; }
    .kanban-board { flex-direction: column; }
    .kanban-col { width: 100%; min-width: 0; }
    /* Fenêtre d'édition : une seule colonne, le panneau passe dessous */
    .editor-cols { flex-direction: column; }
    .editor-side { width: auto; border-left: none; border-top: 1px solid var(--border); }
    /* Vue semaine : colonnes empilées en pleine largeur */
    .week-grid { flex-direction: column; overflow-x: visible; gap: 8px; }
    .week-col { flex: 1 1 auto; min-width: 0; width: 100%; }
  }

  /* ===== MODE EMBED (Notion) : pas de sidebar ni burger ===== */
  body.embed .sidebar, body.embed #sidebarToggle, body.embed .scrim { display: none !important; }
  body.embed .main { padding: 24px 20px; max-width: 100%; }
  body.embed .view-title { font-size: 22px; }
</style>
</head>
<body>

<button class="menu-btn" id="sidebarToggle" aria-label="Afficher/masquer le menu">☰</button>
<div class="scrim" id="scrim"></div>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <button class="add-btn" id="focusAdd">
      <span class="plus">+</span> Ajouter une tâche
    </button>
    <nav class="nav-scroll">
    <div class="nav-sep"></div>
    <button class="nav-item" data-view="todo">
      <span class="icon">📋</span> Todo <span class="count" id="count-todo"></span>
    </button>
    <button class="nav-item" data-view="today">
      <span class="icon">📅</span> Aujourd'hui <span class="count" id="count-today"></span>
    </button>
    <button class="nav-item" data-view="week">
      <span class="icon">🗓️</span> Prochainement
    </button>
    <button class="nav-item" data-view="eisenhower">
      <span class="icon">🎯</span> Eisenhower
    </button>
    <div class="nav-sep"></div>
    <button class="nav-item" data-view="projects">
      <span class="icon">📁</span> Projets
    </button>
    <button class="nav-item" data-view="contacts">
      <span class="icon">🧑</span> Contacts
    </button>
    <button class="nav-item soon">
      <span class="icon">🏷️</span> Labels <span class="count">bientôt</span>
    </button>
    <button class="nav-item soon">
      <span class="icon">🛒</span> Liste de course <span class="count">bientôt</span>
    </button>
    <button class="nav-item soon">
      <span class="icon">💉</span> Vaccins <span class="count">bientôt</span>
    </button>
    </nav>
  </aside>

  <main class="main">
    <div class="main-head">
      <div class="titles">
        <h1 class="view-title" id="viewTitle"></h1>
        <p class="view-sub" id="viewSub"></p>
      </div>
      <div class="head-actions">
        <button class="icon-btn" id="themeToggle" aria-label="Changer de thème">🌙</button>
      </div>
    </div>

    <div class="quick-add">
      <div class="quick-add-row">
        <input class="quick-input" id="quickInput" type="text"
               placeholder="Ex : Acheter du pain demain 18h" autocomplete="off">
        <button class="quick-submit" id="quickSubmit">Ajouter</button>
      </div>
      <div class="flags">
        <button class="flag" data-flag="important"><span class="star">★</span> Important</button>
        <button class="flag" data-flag="urgent">⚡ Urgent</button>
      </div>
    </div>

    <div class="toolbar" id="toolbar">
      <select class="sort-select" id="sortSelect">
        <option value="due">Trier par échéance</option>
        <option value="quadrant">Trier par priorité</option>
        <option value="created">Trier par création</option>
      </select>
    </div>

<script>
"use strict";

/* =========================================================
   CONFIG
   ========================================================= */
const STORAGE_KEY = "todo_app_v1";
const THEME_KEY = "todo_theme";
const DAY_MS = 86400000;                 // millisecondes dans une journée
const DEFAULT_PROJECT_ICON = "📁";       // icône par défaut d'un nouveau projet

// Matrice d'Eisenhower : pour chaque quadrant, libellé, description et drapeaux urgent/important.
// La classe CSS d'un quadrant est toujours "q-" + sa clé (ex : q-faire).
const QUADRANTS = {
  faire:     { label: "Faire",     desc: "Important + Urgent",     urgent: true,  important: true },
  planifier: { label: "Planifier", desc: "Important, pas urgent",  urgent: false, important: true },
  deleguer:  { label: "Déléguer",  desc: "Urgent, pas important",  urgent: true,  important: false },
  eliminer:  { label: "Éliminer",  desc: "Ni urgent ni important", urgent: false, important: false }
};
const QUADRANT_ORDER = ["faire", "planifier", "deleguer", "eliminer"];

function quadrantOf(task) {
  if (task.urgent && task.important) return "faire";
  if (task.important) return "planifier";
  if (task.urgent) return "deleguer";
  return "eliminer";
}

// Statuts d'un projet. Les 4 premiers forment les colonnes du Kanban ;
// "termine" n'y figure pas (les projets terminés ont leur propre vue).
const STATUSES = {
  pas_commence: { label: "Pas commencé", cls: "st-pas_commence" },
  en_cours:     { label: "En cours",     cls: "st-en_cours" },
  en_pause:     { label: "En pause",     cls: "st-en_pause" },
  delegue:      { label: "Délégué",      cls: "st-delegue" },
  termine:      { label: "Terminé",      cls: "st-termine" }
};
const KANBAN_STATUSES = ["en_cours", "en_pause", "delegue", "pas_commence"];

/* =========================================================
   STATE
   ========================================================= */
let state = {
  tasks: [],
  projects: [],
  contacts: [],
  view: "todo",
  sort: "due",
  editingId: null,
  projectId: null,        // projet actuellement ouvert (vue détaillée)
  projSub: "eisen",       // sous-vue du projet par défaut : "eisen" (matrice) ou "list"
  projectsTab: "active",  // onglet de la vue Projets : "active" (tableau) ou "done" (terminés)
  contactSearch: "",      // texte de recherche dans la vue Contacts
  weekAnchor: null,       // début (ms) de la semaine affichée dans Prochainement (null = aujourd'hui)
  expandedTasks: new Set(),  // ids dépliés dans le Todo (tout est replié par défaut)
  expandedWeek: new Set()    // ids dépliés dans la vue Prochainement (indépendant du Todo)
};

/* =========================================================
   DATA LAYER
   Tout passe par db.* — c'est le seul module à remplacer quand on
   migrera vers une sync en ligne (Firebase, étape 5) : il suffira de
   réécrire load/save, le reste de l'app ne changera pas.
   ========================================================= */

// Transforme des données brutes (localStorage OU futur Firebase) en {tasks, projects}.
// Gère l'ancien format (simple tableau de tâches) pour ne rien perdre.
function normalizeData(raw) {
  if (Array.isArray(raw)) return { tasks: raw, projects: [], contacts: [] };
  if (raw && typeof raw === "object") return {
    tasks: raw.tasks || [],
    projects: raw.projects || [],
    contacts: raw.contacts || []
  };
  return { tasks: [], projects: [], contacts: [] };
}

const db = {
  load() {
    let raw = null;
    try { raw = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch {}
    const data = normalizeData(raw);
    state.tasks = data.tasks;
    state.projects = data.projects;
    state.contacts = data.contacts;
  },
  save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      tasks: state.tasks, projects: state.projects, contacts: state.contacts
    }));
  },
  // --- Tâches ---
  add(task) { state.tasks.push(task); this.save(); },
  update(id, changes) {
    const t = state.tasks.find(t => t.id === id);
    if (t) { Object.assign(t, changes); this.save(); }
  },
  remove(id) {
    state.tasks = state.tasks.filter(t => t.id !== id);
    this.save();
  },
  // --- Projets ---
  addProject(p) { state.projects.push(p); this.save(); },
  updateProject(id, changes) {
    const p = state.projects.find(p => p.id === id);
    if (p) { Object.assign(p, changes); this.save(); }
  },
  removeProject(id) {
    state.projects = state.projects.filter(p => p.id !== id);
    this.save();
  },
  // --- Contacts ---
  addContact(c) { state.contacts.push(c); this.save(); },
  updateContact(id, changes) {
    const c = state.contacts.find(c => c.id === id);
    if (c) { Object.assign(c, changes); this.save(); }
  },
  removeContact(id) {
    state.contacts = state.contacts.filter(c => c.id !== id);
    this.save();
  }
};

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

const $ = id => document.getElementById(id);

// Accès à un élément par son id dans chaque collection
const getTask = id => state.tasks.find(t => t.id === id);
const getProject = id => state.projects.find(p => p.id === id);
const getContact = id => state.contacts.find(c => c.id === id);
const isRoot = t => t.parentTaskId == null;   // tâche racine = sans parent

function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function endOfToday() { return startOfDay(new Date()).getTime() + DAY_MS - 1; }
function isDueToday(t) { return t.dueDate != null && t.dueDate <= endOfToday(); }

/* =========================================================
   MOTEUR DE RÉCURRENCE
   recurrence = { freq:"day"|"week"|"month"|"year", interval, weekdays?, nthWeekday? }
   weekdays : [0..6] (0=dimanche) — mode hebdo
   nthWeekday : { week:1..5|-1, day:0..6 } — mode "2e mercredi" (mois/année)
   ========================================================= */
const WEEKDAY_LABELS = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const WEEKDAY_SHORT  = ["D","L","M","M","J","V","S"];
const WEEKDAY_ORDER  = [1,2,3,4,5,6,0];   // lundi -> dimanche, pour l'affichage
const ORDINAL_LABELS = { 1:"1er", 2:"2e", 3:"3e", 4:"4e", "-1":"dernier" };
const MONTH_LABELS = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

// Nième occurrence d'un jour de semaine dans un mois (retombe sur le dernier si le Nième n'existe pas).
function nthWeekdayOfMonth(year, month, week, weekday) {
  if (week === -1) {
    const last = new Date(year, month + 1, 0);
    const back = (last.getDay() - weekday + 7) % 7;
    return startOfDay(new Date(year, month, last.getDate() - back));
  }
  const first = new Date(year, month, 1);
  const offset = (weekday - first.getDay() + 7) % 7;
  const day = 1 + offset + (week - 1) * 7;
  if (day > new Date(year, month + 1, 0).getDate()) return nthWeekdayOfMonth(year, month, -1, weekday);
  return startOfDay(new Date(year, month, day));
}

// Première occurrence STRICTEMENT après fromTs, selon la règle.
function nextOccurrence(fromTs, rec) {
  const from = startOfDay(fromTs);
  const interval = Math.max(1, rec.interval || 1);

  if (rec.freq === "day") {
    const d = new Date(from); d.setDate(d.getDate() + interval);
    return startOfDay(d).getTime();
  }
  if (rec.freq === "week") {
    const set = new Set((rec.weekdays && rec.weekdays.length) ? rec.weekdays : [from.getDay()]);
    const mondayOf = d => { const x = startOfDay(d); x.setDate(x.getDate() - ((x.getDay() + 6) % 7)); return x; };
    const anchorMon = mondayOf(from).getTime();
    const cursor = new Date(from);
    for (let i = 0; i < 366 * interval + 14; i++) {
      cursor.setDate(cursor.getDate() + 1);
      if (!set.has(cursor.getDay())) continue;
      const weeks = Math.round((mondayOf(cursor).getTime() - anchorMon) / (7 * DAY_MS));
      if (weeks % interval === 0) return startOfDay(cursor).getTime();
    }
    return null;
  }
  if (rec.freq === "month") {
    if (rec.nthWeekday) {
      let y = from.getFullYear(), m = from.getMonth(), cand;
      do { m += interval; y += Math.floor(m / 12); m = ((m % 12) + 12) % 12;
           cand = nthWeekdayOfMonth(y, m, rec.nthWeekday.week, rec.nthWeekday.day); }
      while (cand.getTime() <= from.getTime());
      return cand.getTime();
    }
    const day = from.getDate();
    let y = from.getFullYear(), m = from.getMonth() + interval;
    y += Math.floor(m / 12); m = ((m % 12) + 12) % 12;
    const dim = new Date(y, m + 1, 0).getDate();
    return startOfDay(new Date(y, m, Math.min(day, dim))).getTime();
  }
  if (rec.freq === "year") {
    if (rec.nthWeekday) {
      return nthWeekdayOfMonth(from.getFullYear() + interval, from.getMonth(), rec.nthWeekday.week, rec.nthWeekday.day).getTime();
    }
    const y = from.getFullYear() + interval, m = from.getMonth(), day = from.getDate();
    const dim = new Date(y, m + 1, 0).getDate();
    return startOfDay(new Date(y, m, Math.min(day, dim))).getTime();
  }
  return null;
}

// Avance une tâche récurrente jusqu'à son prochain créneau strictement futur.
function advanceRecurrence(task) {
  const today = startOfDay(new Date()).getTime();
  let next = nextOccurrence(task.dueDate, task.recurrence);
  let guard = 0;
  while (next != null && next <= today && guard++ < 5000) next = nextOccurrence(next, task.recurrence);
  if (next != null) task.dueDate = next;
}

// Libellé court d'une récurrence (indicateur + résumé éditeur).
function recurrenceLabel(rec) {
  if (!rec) return "";
  const n = rec.interval || 1;
  if (rec.freq === "day")  return n === 1 ? "tous les jours" : `tous les ${n} jours`;
  if (rec.freq === "week") {
    if (rec.weekdays && rec.weekdays.length) {
      const days = WEEKDAY_ORDER.filter(d => rec.weekdays.includes(d)).map(d => WEEKDAY_LABELS[d]);
      const list = days.length > 2 ? days.map(d => d.slice(0,3)).join(", ") : days.join(" et ");
      return (n === 1 ? "chaque " : `1 sem./${n}, `) + list;
    }
    return n === 1 ? "toutes les semaines" : `toutes les ${n} semaines`;
  }
  if (rec.freq === "month") {
    const base = n === 1 ? "tous les mois" : `tous les ${n} mois`;
    if (rec.nthWeekday) return `${base}, le ${ORDINAL_LABELS[rec.nthWeekday.week]} ${WEEKDAY_LABELS[rec.nthWeekday.day]}`;
    return base;
  }
  if (rec.freq === "year") {
    const base = n === 1 ? "tous les ans" : `tous les ${n} ans`;
    if (rec.nthWeekday) return `${base}, le ${ORDINAL_LABELS[rec.nthWeekday.week]} ${WEEKDAY_LABELS[rec.nthWeekday.day]}`;
    return base;
  }
  return "";
}

/* =========================================================
   PARSER DE DATES (français, maison)
   Extrait une date/heure du texte et renvoie le titre nettoyé.
   ========================================================= */
const WEEKDAYS = {
  lundi: 1, mardi: 2, mercredi: 3, jeudi: 4,
  vendredi: 5, samedi: 6, dimanche: 0
};
const MONTHS = {
  janvier:0, février:1, fevrier:1, mars:2, avril:3, mai:4, juin:5,
  juillet:6, août:7, aout:7, septembre:8, octobre:9, novembre:10, décembre:11, decembre:11
};
const NUM_WORDS = {
  un:1, une:1, deux:2, trois:3, quatre:4, cinq:5,
  six:6, sept:7, huit:8, neuf:9, dix:10
};

function parseInput(raw) {
  let text = " " + raw.trim() + " ";
  let date = null;     // objet Date (jour) ou null
  let time = null;     // "HH:MM" ou null
  let urgent = false, important = false;

  const consume = (regex, fn) => {
    const m = text.match(regex);
    if (m) { fn(m); text = text.replace(m[0], " "); return true; }
    return false;
  };

  // --- Heure : "18h", "18h30", "à 9h", "9:30" ---
  consume(/\b(?:à\s*)?(\d{1,2})\s*h\s*(\d{2})?\b/i, m => {
    const h = m[1].padStart(2, "0");
    const min = (m[2] || "00").padStart(2, "0");
    time = h + ":" + min;
  });
  if (!time) {
    consume(/\b(\d{1,2}):(\d{2})\b/, m => {
      time = m[1].padStart(2,"0") + ":" + m[2];
    });
  }

  const today = startOfDay(new Date());

  // --- Mots-clés relatifs ---
  if (!date && consume(/\baujourd'?hui\b/i, () => {})) date = new Date(today);
  if (!date && consume(/\bapr[èe]s[-\s]demain\b/i, () => {})) {
    date = new Date(today); date.setDate(date.getDate() + 2);
  }
  if (!date && consume(/\bdemain\b/i, () => {})) {
    date = new Date(today); date.setDate(date.getDate() + 1);
  }

  // --- "dans X jours/semaines/mois/ans" (X en chiffres ou en lettres) ---
  if (!date) consume(/\bdans\s+(\d{1,3}|un|une|deux|trois|quatre|cinq|six|sept|huit|neuf|dix)\s+(jours?|journ[ée]es?|semaines?|mois|ans?|années?)\b/i, m => {
    date = new Date(today);
    const w = m[1].toLowerCase();
    const n = /^\d+$/.test(w) ? parseInt(w, 10) : NUM_WORDS[w];
    const unit = m[2].toLowerCase();
    if (/semaine/.test(unit)) date.setDate(date.getDate() + n * 7);
    else if (/mois/.test(unit)) date.setMonth(date.getMonth() + n);
    else if (/an/.test(unit)) date.setFullYear(date.getFullYear() + n);
    else date.setDate(date.getDate() + n);
  });

  // --- Jour de la semaine : "lundi", "lundi prochain" ---
  if (!date) consume(/\b(lundi|mardi|mercredi|jeudi|vendredi|samedi|dimanche)(\s+prochain)?\b/i, m => {
    const target = WEEKDAYS[m[1].toLowerCase()];
    date = new Date(today);
    let diff = (target - date.getDay() + 7) % 7;
    if (diff === 0) diff = 7;                 // "lundi" = le prochain lundi
    date.setDate(date.getDate() + diff);
  });

  // --- Date "15/03" ou "15/03/2026" ---
  if (!date) consume(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/, m => {
    const day = parseInt(m[1],10), mon = parseInt(m[2],10) - 1;
    let year = m[3] ? parseInt(m[3],10) : today.getFullYear();
    if (year < 100) year += 2000;
    date = new Date(year, mon, day);
    if (!m[3] && date < today) date.setFullYear(year + 1); // date passée -> année suivante
  });

  // --- Date "15 mars" ---
  if (!date) consume(/\b(\d{1,2})\s+(janvier|février|fevrier|mars|avril|mai|juin|juillet|août|aout|septembre|octobre|novembre|décembre|decembre)\b/i, m => {
    const day = parseInt(m[1],10);
    const mon = MONTHS[m[2].toLowerCase()];
    let year = today.getFullYear();
    date = new Date(year, mon, day);
    if (date < today) date.setFullYear(year + 1);
  });

  // --- Priorité : mots "urgent" / "important" dans le texte ---
  consume(/\burgente?s?\b/i, () => { urgent = true; });
  consume(/\bimportante?s?\b/i, () => { important = true; });

  const title = text.replace(/\s+/g, " ").trim();
  return {
    title: title || raw.trim(),
    dueDate: date ? date.getTime() : null,
    dueTime: time,
    urgent,
    important
  };
}

/* =========================================================
   FORMAT D'AFFICHAGE DES DATES
   ========================================================= */
const DAY_NAMES = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
const MONTH_NAMES = ["jan","fév","mars","avr","mai","juin","juil","août","sept","oct","nov","déc"];

function formatDueTs(ts, dueTime) {
  if (ts == null) return null;
  const d = startOfDay(ts);
  const today = startOfDay(new Date());
  const diff = Math.round((d - today) / DAY_MS);

  let label, cls = "";
  if (diff < 0) { label = "En retard"; cls = "overdue"; }
  else if (diff === 0) { label = "Aujourd'hui"; cls = "today"; }
  else if (diff === 1) label = "Demain";
  else if (diff < 7) label = DAY_NAMES[d.getDay()];
  else label = d.getDate() + " " + MONTH_NAMES[d.getMonth()];

  if (dueTime) label += " " + dueTime;
  return { label, cls };
}
function formatDue(task) { return formatDueTs(task.dueDate, task.dueTime); }

// Date héritée : remonte la chaîne des parents et renvoie la 1re date d'ancêtre trouvée (sinon null).
function nearestAncestorDue(task) {
  let cur = task.parentTaskId ? getTask(task.parentTaskId) : null;
  while (cur) {
    if (cur.dueDate != null) return cur.dueDate;
    cur = cur.parentTaskId ? getTask(cur.parentTaskId) : null;
  }
  return null;
}

/* =========================================================
   SÉCURITÉ : échappement du contenu utilisateur (anti-XSS)
   ========================================================= */
function esc(s) {
  const d = document.createElement("div");
  d.textContent = s ?? "";
  return d.innerHTML;
}

/* =========================================================
   VUES
   ========================================================= */
function visibleTasks() {
  let list = state.tasks.filter(t => !t.completed);
  if (state.view === "today") {
    // Vue échéance : toute tâche due aujourd'hui (retards inclus), racine ou sous-tâche.
    // Tri agenda : heure croissante en haut, puis priorité, puis ordre manuel.
    list = list.filter(isDueToday);
    state.flatList = false;
    return agendaSort(list);
  } else {
    // Todo : seulement les racines ; les sous-tâches s'affichent en dépliant
    list = list.filter(isRoot);
    state.flatList = false;
  }
  return sortTasks(list);
}

function sortTasks(list) {
  const copy = [...list];
  if (state.sort === "quadrant") {
    copy.sort((a,b) => QUADRANT_ORDER.indexOf(quadrantOf(a)) - QUADRANT_ORDER.indexOf(quadrantOf(b)));
  } else if (state.sort === "created") {
    copy.sort((a,b) => a.createdAt - b.createdAt);
  } else { // due : sans date à la fin
    copy.sort((a,b) => {
      if (a.dueDate == null && b.dueDate == null) return 0;
      if (a.dueDate == null) return 1;
      if (b.dueDate == null) return -1;
      return a.dueDate - b.dueDate;
    });
  }
  return copy;
}

// Tri des vues agenda (Aujourd'hui, Prochainement) :
//  1. tâches AVEC heure en haut, par heure croissante (ordre fixe) ;
//  2. puis tâches SANS heure, par priorité (quadrant Eisenhower) ;
//  3. à priorité égale et sans heure : ordre manuel = ordre dans state.tasks
//     (c'est ce niveau qui sera réordonnable par glisser-déposer).
function agendaSort(list) {
  const idx = new Map(state.tasks.map((t, i) => [t.id, i]));
  return [...list].sort((a, b) => {
    const ta = a.dueTime || "", tb = b.dueTime || "";
    if (ta && tb) { if (ta !== tb) return ta.localeCompare(tb); }
    else if (ta) return -1;          // a a une heure, b non -> a au-dessus
    else if (tb) return 1;
    const q = QUADRANT_ORDER.indexOf(quadrantOf(a)) - QUADRANT_ORDER.indexOf(quadrantOf(b));
    if (q !== 0) return q;
    return (idx.get(a.id) ?? 0) - (idx.get(b.id) ?? 0);
  });
}

// HTML d'UNE ligne de tâche (racine ou sous-tâche), sans carte englobante.
// depth : 0 = racine, 1+ = sous-tâche (indentation par un trait vertical).

// Style de fond des guides en arbre : une verticale par ancêtre dont la branche continue.
// Partagé entre la vue Todo et la vue Prochainement pour éviter toute divergence.
function treeGuideStyle(depth, ancestorContinues) {
  if (depth < 1) return "";
  const pipes = [];
  ancestorContinues.forEach((cont, level) => { if (cont) pipes.push(8 + level * 22); });
  if (!pipes.length) return "";
  const g = pipes.map(() => "linear-gradient(var(--border),var(--border))").join(",");
  const p = pipes.map(x => `${x}px 0`).join(",");
  const s = pipes.map(() => "2px 100%").join(",");
  return `background-image:${g};background-position:${p};background-size:${s};`;
}

function taskRowHtml(task, depth, ancestorContinues = [], isLast = false) {
  // Date effective : la sienne si elle en a une, sinon héritée de l'ancêtre daté le plus proche
  // (calculée à l'affichage, jamais stockée). L'héritée s'affiche en style atténué/italique.
  const ownDue = task.dueDate != null;
  const effTs = ownDue ? task.dueDate : nearestAncestorDue(task);
  const inherited = !ownDue && effTs != null;
  const due = effTs != null ? formatDueTs(effTs, ownDue ? task.dueTime : null) : null;

  // Nom du projet, affiché seulement sur la racine (pas les sous-tâches), hors vue projet
  const project = (task.projectId && state.view !== "project" && depth === 0) ? getProject(task.projectId) : null;
  const metaParts = [];
  if (due) metaParts.push(`<span class="due ${inherited ? "inherited" : due.cls}">📅 ${esc(due.label)}</span>`);
  if (task.recurrence) metaParts.push(`<span class="task-recur">🔁 ${esc(recurrenceLabel(task.recurrence))}</span>`);
  if (project) {
    metaParts.push(`<span class="task-project">${esc(project.icon || DEFAULT_PROJECT_ICON)} ${esc(project.name)}</span>`);
    if (project.status === "delegue" && project.assigneeId) {
      const contact = getContact(project.assigneeId);
      if (contact) metaParts.push(`<span class="task-contact">🧑 ${esc(contact.name)}</span>`);
    }
  }
  const metaHtml = metaParts.length ? `<div class="task-meta">${metaParts.join("")}</div>` : "";

  const { done, total } = subtaskProgress(task.id);
  const expanded = state.expandedTasks.has(task.id);
  const chevronHtml = total > 0
    ? `<button class="task-chevron" data-action="toggle-children" aria-label="Déplier">${expanded ? "▾" : "▸"}</button>`
    : `<span class="task-chevron-spacer"></span>`;
  // Racine : barre de progression complète. Sous-tâche : petit badge X/Y à côté du titre.
  const progressHtml = (depth === 0 && total > 0) ? progressBarHtml(done, total) : "";
  const subCountBadge = (depth > 0 && total > 0) ? `<span class="count-badge">${done}/${total}</span>` : "";
  const canAddChild = taskDepth(task) < MAX_TASK_DEPTH;
  const doneCls = task.completed ? " done" : "";

  // Guides en arbre : une verticale de fond par ancêtre dont la branche continue (calculé au rendu).
  const guideStyle = treeGuideStyle(depth, ancestorContinues);
  const lastCls = (depth >= 1 && isLast) ? " task-last" : "";

  return `
    <div class="task-row${doneCls}${lastCls}" data-id="${task.id}" style="--depth:${depth};${guideStyle}">
      ${chevronHtml}
      <button class="checkbox" data-action="toggle" aria-label="Terminer"></button>
      <div class="task-body" data-action="edit">
        <div class="task-titleline"><span class="task-title">${esc(task.title)}</span>${subCountBadge}</div>
        ${task.note ? `<div class="task-note">${esc(task.note)}</div>` : ""}
        ${metaHtml}
        ${progressHtml}
      </div>
      ${canAddChild ? `<button class="task-addsub" data-action="add-sub" aria-label="Ajouter une sous-tâche"><span class="plus-sm">+</span></button>` : ""}
      <button class="task-del" data-action="delete" aria-label="Supprimer">×</button>
    </div>
    <div class="task-addsub-zone" data-id="${task.id}" hidden>
      <input class="task-addsub-input" type="text" placeholder="Nouvelle sous-tâche…" autocomplete="off">
    </div>
  `;
}

// Lignes d'une tâche et de toute sa descendance dépliée (récursif), pour une seule carte.
function taskTreeRows(task, depth, ancestorContinues = [], isLast = false) {
  let html = taskRowHtml(task, depth, ancestorContinues, isLast);
  if (state.expandedTasks.has(task.id)) {
    const kids = childTasks(task.id);
    // Lignée transmise aux enfants : on ajoute "le parent continue-t-il ?" (= il n'est pas le dernier).
    const childAnc = depth >= 1 ? [...ancestorContinues, !isLast] : [];
    kids.forEach((child, i) => { html += taskTreeRows(child, depth + 1, childAnc, i === kids.length - 1); });
  }
  return html;
}

// Carte d'une tâche racine : un seul contour qui englobe la racine ET ses sous-tâches.
// (En matrice, on n'affiche que la racine : voir le 2e argument.)
function taskCard(task, withChildren = true) {
  const li = document.createElement("li");
  li.className = "task q-" + quadrantOf(task) + (task.completed ? " done" : "");
  li.dataset.id = task.id;
  li.innerHTML = withChildren ? taskTreeRows(task, 0) : taskRowHtml(task, 0);
  return li;
}

function render() {
  // Titre + sous-titre (la page projet a son propre en-tête, donc titre vide)
  const titles = {
    todo:  { t: "Todo", s: "Toutes les tâches à accomplir" },
    today: { t: "Aujourd'hui", s: new Date().toLocaleDateString("fr-FR", { weekday:"long", day:"numeric", month:"long" }) },
    eisenhower: { t: "Eisenhower", s: "Tes tâches classées par urgence et importance" },
    projects: { t: "Projets", s: "Tes projets, organisés par statut" },
    contacts: { t: "Contacts", s: "Tes contacts et leurs projets délégués" },
    week: { t: "Prochainement", s: "Tes échéances des 7 prochains jours" }
  };
  const info = titles[state.view] || { t: "", s: "" };
  document.getElementById("viewTitle").textContent = info.t;
  document.getElementById("viewSub").textContent = info.s;

  // La saisie rapide et le tri ne concernent que les vues de tâches simples
  const tasksView = state.view === "todo" || state.view === "today";
  $("toolbar").style.display = state.view === "todo" ? "flex" : "none";
  document.querySelector(".quick-add").style.display = tasksView ? "block" : "none";

  // Compteurs : Todo compte les racines (cohérent avec l'affichage) ; Aujourd'hui compte toute échéance du jour
  const active = state.tasks.filter(t => !t.completed);
  $("count-todo").textContent = active.filter(isRoot).length || "";
  $("count-today").textContent = active.filter(isDueToday).length || "";

  // Nav active (la page projet garde "Projets" en surbrillance)
  document.querySelectorAll(".nav-item[data-view]").forEach(b => {
    const on = b.dataset.view === state.view || (state.view === "project" && b.dataset.view === "projects");
    b.classList.toggle("active", on);
  });

  // Affichage : on masque tous les conteneurs de vues, puis on montre celui de la vue courante
  ["taskList","eisenGrid","kanbanBoard","projectsTabs","projectsDone","projectsPriorities","projectView","contactsView","weekView"]
    .forEach(id => { $(id).style.display = "none"; });
  const gridEl = $("eisenGrid");
  const kanbanEl = $("kanbanBoard");
  const tabsEl = $("projectsTabs");
  const doneEl = $("projectsDone");
  const prioEl = $("projectsPriorities");

  if (state.view === "eisenhower") {
    gridEl.style.display = "grid";
    renderEisenhower();
  } else if (state.view === "projects") {
    tabsEl.style.display = "flex";
    // onglet actif
    const doneCount = state.projects.filter(p => p.status === "termine").length;
    tabsEl.querySelector('[data-ptab="done"]').textContent = "Archive" + (doneCount ? ` (${doneCount})` : "");
    tabsEl.querySelectorAll(".subview-btn").forEach(b =>
      b.classList.toggle("active", b.dataset.ptab === state.projectsTab));
    if (state.projectsTab === "done") {
      doneEl.style.display = "flex";
      renderProjectsDone();
    } else {
      kanbanEl.style.display = "flex";
      prioEl.style.display = "block";
      $("projectsEisenGrid").style.display = "grid";
      renderKanban();
      renderProjectsEisenhower();
    }
  } else if (state.view === "project") {
    $("projectView").style.display = "block";
    renderProjectView();
  } else if (state.view === "contacts") {
    $("contactsView").style.display = "block";
    renderContacts();
  } else if (state.view === "week") {
    $("weekView").style.display = "block";
    renderWeek();
  } else {
    $("taskList").style.display = "flex";
    renderList();
  }
}

// Affiche une liste de tâches. Mode arbre (défaut) : chaque racine est une carte qui englobe
// ses sous-tâches. Mode plat (flat=true) : chaque tâche est une carte seule (vue Aujourd'hui).
function renderTasksInto(ul, tasks, emptyHtml, flat = false) {
  ul.innerHTML = "";
  if (tasks.length === 0) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.innerHTML = emptyHtml;
    ul.appendChild(empty);
    return;
  }
  tasks.forEach(t => ul.appendChild(taskCard(t, !flat)));
}

function renderList() {
  const emptyHtml = state.view === "today"
    ? `<div class="big">🎉</div>Rien de prévu aujourd'hui.`
    : `<div class="big">📭</div>Aucune tâche. Ajoute-en une ci-dessus.`;
  renderTasksInto($("taskList"), visibleTasks(), emptyHtml, state.flatList);
  // Aujourd'hui : seules les tâches SANS heure sont réordonnables par glisser-déposer
  if (state.view === "today") {
    [...$("taskList").children].forEach(li => {
      const t = li.dataset.id ? getTask(li.dataset.id) : null;
      if (t && !t.dueTime) li.classList.add("agenda-drag");
    });
  }
}

// Remplit une <ul> avec des cartes, ou un message si la liste est vide.
// Partagé par la matrice Eisenhower, le Kanban et la liste des projets terminés.
function fillColumn(ul, items, makeCard, emptyText = "—") {
  ul.innerHTML = "";
  if (items.length === 0) {
    const d = document.createElement("div");
    d.className = "col-empty";
    d.textContent = emptyText;
    ul.appendChild(d);
  } else {
    items.forEach(it => ul.appendChild(makeCard(it)));
  }
}

// Construit une matrice Eisenhower dans n'importe quel conteneur, pour une liste de tâches.
// Utilisée pour la vue globale, la matrice d'un projet, et la synthèse des projets actifs.
// opts.showAdd (défaut true) : afficher ou non le bouton "+" d'ajout par case.
function renderEisenhowerInto(board, tasks, opts = {}) {
  const showAdd = opts.showAdd !== false;
  board.innerHTML = "";
  // La matrice ne montre que les tâches racines (les sous-tâches vivent dans les listes)
  const active = tasks.filter(t => !t.completed && isRoot(t));
  QUADRANT_ORDER.forEach(key => {
    const q = QUADRANTS[key];
    const cell = document.createElement("div");
    cell.className = "eisen-cell q-" + key;
    cell.dataset.q = key;
    cell.innerHTML = `
      <div class="eisen-head"><span class="eisen-title">${q.label}</span><span class="eisen-sub">${q.desc}</span></div>
      <ul class="task-list"></ul>
      ${showAdd ? `
      <div class="eisen-add">
        <button class="eisen-add-btn" type="button"><span class="plus-sm">+</span></button>
        <input class="eisen-add-input" type="text" placeholder="Nouvelle tâche…" autocomplete="off" hidden>
      </div>` : ""}
    `;
    fillColumn(cell.querySelector(".task-list"), active.filter(t => quadrantOf(t) === key), t => taskCard(t, true));
    board.appendChild(cell);
  });
}

function renderEisenhower() {
  renderEisenhowerInto($("eisenGrid"), state.tasks);
}

// Synthèse : tâches des projets En cours et Délégué, classées par priorité.
function renderProjectsEisenhower() {
  const activeIds = state.projects
    .filter(p => p.status === "en_cours" || p.status === "delegue")
    .map(p => p.id);
  const tasks = state.tasks.filter(t => activeIds.includes(t.projectId));
  renderEisenhowerInto($("projectsEisenGrid"), tasks, { showAdd: false });
}

// Avancement générique d'une liste de tâches : { done, total }
function progress(list) {
  return { done: list.filter(t => t.completed).length, total: list.length };
}

// Avancement d'un projet : { done, total }, sur les tâches RACINES du projet
// (une racine reflète déjà l'état de ses sous-tâches via la complétion automatique).
function projectProgress(projectId) {
  return progress(state.tasks.filter(t => t.projectId === projectId && isRoot(t)));
}

/* ---- Hiérarchie des sous-tâches (parentTaskId, 3 niveaux max) ---- */
const MAX_TASK_DEPTH = 3;   // niveaux : 1 (racine) → 2 → 3

// Sous-tâches directes d'une tâche, dans l'ordre de state.tasks
function childTasks(taskId) {
  return state.tasks.filter(t => t.parentTaskId === taskId);
}

// Profondeur d'une tâche (1 = racine). Remonte la chaîne des parents.
function taskDepth(task) {
  let depth = 1, cur = task;
  while (cur && cur.parentTaskId) { cur = getTask(cur.parentTaskId); depth++; }
  return depth;
}

// Avancement d'une tâche d'après ses sous-tâches directes : { done, total }
function subtaskProgress(taskId) {
  return progress(childTasks(taskId));
}

// Coche/décoche toute la descendance d'une tâche (cascade vers le bas)
function setCompletedDeep(taskId, done) {
  childTasks(taskId).forEach(child => {
    child.completed = done;
    child.completedAt = done ? Date.now() : null;
    setCompletedDeep(child.id, done);
  });
}

// Recalcule l'état d'une tâche d'après ses enfants, puis remonte vers les parents (option c).
// Une tâche ayant des enfants est "faite" quand TOUS ses enfants directs le sont.
function refreshCompletionUpwards(taskId) {
  const task = getTask(taskId);
  if (!task) return;
  const kids = childTasks(taskId);
  if (kids.length > 0) {
    const allDone = kids.every(k => k.completed);
    task.completed = allDone;
    task.completedAt = allDone ? Date.now() : null;
  }
  if (task.parentTaskId) refreshCompletionUpwards(task.parentTaskId);
}

// Barre de progression réutilisable (projets ET tâches avec sous-tâches).
// La couleur de remplissage suit la variable --proj-color posée sur le conteneur.
function progressBarHtml(done, total) {
  const pct = Math.round((done / total) * 100);
  return `
    <div class="proj-progress">
      <div class="proj-bar"><div class="proj-bar-fill" style="width:${pct}%"></div></div>
      <span class="proj-pct">${pct}%</span>
    </div>
    <div class="proj-meta">${done}/${total} fait${done > 1 ? "s" : ""}</div>`;
}

function projectCard(project) {
  const li = document.createElement("li");
  li.className = "proj-card";
  li.dataset.id = project.id;
  // Couleur du statut, partagée par la barre de progression et le bouton "+ Tâche"
  li.style.setProperty("--proj-color", `var(--st-${project.status})`);

  const { done, total } = projectProgress(project.id);
  const progressHtml = total === 0
    ? `<div class="proj-empty">Aucune tâche</div>`
    : progressBarHtml(done, total);

  li.innerHTML = `
    <div class="proj-head">
      <span class="proj-icon">${esc(project.icon || DEFAULT_PROJECT_ICON)}</span>
      <span class="proj-name">${esc(project.name)}</span>
      <button class="proj-del" type="button" aria-label="Supprimer le projet">×</button>
    </div>
    ${progressHtml}
    <button class="proj-add" type="button"><span class="plus-sm">+</span> Tâche</button>
    <div class="proj-add-zone" hidden>
      <input class="proj-add-input" type="text" placeholder="Nouvelle tâche…" autocomplete="off">
      ${flagsHtml()}
    </div>
  `;
  return li;
}

function renderKanban() {
  const board = $("kanbanBoard");
  board.innerHTML = "";
  KANBAN_STATUSES.forEach(key => {
    const st = STATUSES[key];
    const projects = state.projects.filter(p => p.status === key);
    const col = document.createElement("div");
    col.className = "kanban-col " + st.cls;
    col.dataset.status = key;
    col.innerHTML = `
      <div class="kanban-head">
        <span class="kanban-dot"></span>
        <span class="kanban-title">${st.label}</span>
        <span class="kanban-count">${projects.length || ""}</span>
      </div>
      <ul class="kanban-list"></ul>

      <div class="col-add">

        <input class="col-add-input" type="text" placeholder="Nom du projet…" autocomplete="off" hidden>
      </div>` : ""}
    `;

    board.appendChild(col);

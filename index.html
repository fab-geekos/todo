}

// Liste des projets terminés (réutilise la carte projet)
function renderProjectsDone() {
  const done = state.projects.filter(p => p.status === "termine");
  fillColumn($("projectsDone"), done, projectCard, "Aucun projet terminé.");
}

/* =========================================================
   ACTIONS
   ========================================================= */
// Fabrique une tâche à partir d'un texte. flags force la priorité (sinon celle déduite du texte).
function makeTask(raw, flags, projectId = null, parentTaskId = null) {
  const parsed = parseInput(raw);
  return {
    id: uid(),
    title: parsed.title,
    note: "",
    dueDate: parsed.dueDate,
    dueTime: parsed.dueTime,
    urgent: flags ? flags.urgent : parsed.urgent,
    important: flags ? flags.important : parsed.important,
    completed: false,
    createdAt: Date.now(),
    projectId,
    parentTaskId,
    recurrence: null
  };
}

/* =========================================================
   COMPOSANT « BOUTONS DE PRIORITÉ » (Important / Urgent)
   Un seul endroit qui génère le HTML, lit l'état et réinitialise.
   Réutilisé par la saisie rapide, le + Tâche d'un projet, et la vue Liste d'un projet.
   Le toggle est géré globalement (voir le listener délégué dans bindEvents).
   ========================================================= */
function flagsHtml(flags) {
  flags = flags || {};
  return `<div class="flags">
    <button class="flag${flags.important ? " on" : ""}" data-flag="important"><span class="star">★</span> Important</button>
    <button class="flag${flags.urgent ? " on" : ""}" data-flag="urgent">⚡ Urgent</button>
  </div>`;
}

// Lit l'état des boutons de priorité dans un conteneur -> { urgent, important }
function readFlags(container) {
  const on = sel => !!(container && container.querySelector(`.flag.on[data-flag="${sel}"]`));
  return { urgent: on("urgent"), important: on("important") };
}

function addTask() {
  const input = $("quickInput");
  const raw = input.value.trim();
  if (!raw) return;

  // makeTask déduit urgent/important du texte ; on y ajoute les boutons cliqués
  const flags = readFlags(document.querySelector(".quick-add"));
  const task = makeTask(raw);
  task.urgent = task.urgent || flags.urgent;
  task.important = task.important || flags.important;
  db.add(task);

  input.value = "";
  document.querySelectorAll(".quick-add .flag").forEach(f => f.classList.remove("on"));
  input.focus();
  render();
}

// Ajout depuis une case de matrice : la priorité du quadrant est imposée.
// projectId rattache la tâche à un projet (null = tâche libre).
function addTaskInQuadrant(q, raw, projectId = null) {
  db.add(makeTask(raw, QUADRANTS[q], projectId));
}

function closeEisenAdd(input) {
  input.hidden = true;
  input.value = "";
  input.closest(".eisen-add").querySelector(".eisen-add-btn").hidden = false;
}

/* ---- Projets ---- */
// Crée un projet dans la colonne (statut) donnée. Si "Délégué", on demande le contact.
function addProject(status, name) {
  const p = { id: uid(), name, icon: DEFAULT_PROJECT_ICON, status, createdAt: Date.now() };
  if (status === "delegue") {
    const contactId = pickContact();
    if (contactId === false) return;   // annulé : pas de création
    p.assigneeId = contactId;
  }
  db.addProject(p);
}

// Ajoute une tâche rattachée à un projet, avec priorité éventuelle (boutons Important/Urgent)

// Supprime définitivement un projet et toutes ses tâches (après confirmation)
function deleteProject(id) {
  const p = getProject(id);
  if (!p) return;
  const n = state.tasks.filter(t => t.projectId === id).length;
  const msg = `Supprimer définitivement le projet « ${p.name} »`
    + (n ? ` et ses ${n} tâche${n > 1 ? "s" : ""} ?` : " ?");
  if (!confirm(msg)) return;
  state.tasks = state.tasks.filter(t => t.projectId !== id);  // retire les tâches du projet

// Change le statut d'un projet. Si le nouveau statut est "Délégué", on demande
// à quel contact l'assigner ; sinon on retire l'assignation.
function setProjectStatus(projectId, status) {
  const changes = { status };
  if (status === "delegue") {
    const contactId = pickContact();
    if (contactId === false) return false;   // annulé : on ne change rien
    changes.assigneeId = contactId;          // peut être null (délégué sans contact précis)
  } else {
    changes.assigneeId = null;
  }
  db.updateProject(projectId, changes);
  return true;
}

// Demande de choisir un contact (par numéro) ou d'en créer un. Renvoie un id, null, ou false (annulé).
function pickContact() {
  const list = [...state.contacts].sort((a, b) => a.name.localeCompare(b.name, "fr"));
  let msg = "À quel contact déléguer ce projet ?\n\n";
  list.forEach((c, i) => { msg += `${i + 1}. ${c.name}\n`; });
  msg += `\nTape le numéro du contact, ou un nouveau nom pour créer un contact.\n(Laisse vide pour déléguer sans contact précis.)`;
  const answer = prompt(msg);
  if (answer === null) return false;                 // annulé
  const trimmed = answer.trim();
  if (trimmed === "") return null;                   // délégué sans contact
  const num = parseInt(trimmed, 10);
  if (/^\d+$/.test(trimmed) && num >= 1 && num <= list.length) {
    return list[num - 1].id;                         // contact existant choisi
  }
  const c = { id: uid(), name: trimmed, birthday: null };  // nouveau contact
  db.addContact(c);
  return c.id;
}

const MONTH_LONG = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];

// Affiche un anniversaire stocké "MM-JJ" en texte lisible ("14 juillet")
function formatBirthday(bday) {
  if (!bday) return null;
  const [m, d] = bday.split("-").map(Number);
  if (!m || !d) return null;
  return d + " " + MONTH_LONG[m - 1];
}

/* =========================================================
   VUE SEMAINE (Prochainement) — 7 jours à partir d'une date d'ancrage
   ========================================================= */
// Prochaine occurrence (ms, à minuit) d'un anniversaire "MM-DD" à partir d'un jour donné.
// Contacts dont l'anniversaire tombe ce jour-là. Renvoie { contact, shifted } :
// shifted = anniversaire du 29/02 reporté au 28/02 (année non bissextile).
function isLeapYear(y) { return (y % 4 === 0 && y % 100 !== 0) || y % 400 === 0; }
function birthdaysOnDay(dayTs) {
  const d = new Date(dayTs);
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const key = mm + "-" + dd;
  const result = state.contacts.filter(c => c.birthday === key).map(c => ({ contact: c, shifted: false }));
  // 29 février inexistant : on l'affiche le 28 février, avec une note.
  if (mm === "02" && dd === "28" && !isLeapYear(d.getFullYear())) {
    state.contacts.filter(c => c.birthday === "02-29").forEach(c => result.push({ contact: c, shifted: true }));
  }
  return result;
}

// Sous-arbre compact d'une tâche pour la vue semaine (chevron, guides en arbre partagés, clics délégués).
// late : badge "en retard" (uniquement sur la racine repliée dans Aujourd'hui).
function weekTaskTree(task, depth, ancestorContinues = [], isLast = false, late = false) {
  const time = task.dueTime ? `<span class="due">🕒 ${esc(task.dueTime)}</span>` : "";
  const recur = task.recurrence ? `<span class="task-recur">🔁 ${esc(recurrenceLabel(task.recurrence))}</span>` : "";
  const project = (task.projectId && depth === 0) ? getProject(task.projectId) : null;
  const projHtml = project ? `<span class="task-project">${esc(project.icon || DEFAULT_PROJECT_ICON)} ${esc(project.name)}</span>` : "";
  const metaParts = [time, recur, projHtml].filter(Boolean);
  const meta = metaParts.length ? `<div class="task-meta">${metaParts.join("")}</div>` : "";

  const { done, total } = subtaskProgress(task.id);
  const expanded = state.expandedWeek.has(task.id);
  const chevron = total > 0
    ? `<button class="task-chevron" data-action="toggle-children" aria-label="Déplier">${expanded ? "▾" : "▸"}</button>`
    : `<span class="task-chevron-spacer"></span>`;
  // Racine : barre de progression complète. Sous-tâche : petit badge X/Y (comme dans le Todo).
  const progressHtml = (depth === 0 && total > 0) ? progressBarHtml(done, total) : "";
  const subCount = (depth > 0 && total > 0) ? `<span class="count-badge">${done}/${total}</span>` : "";
  const lateHtml = late ? `<span class="week-late">en retard</span>` : "";
  const guideStyle = treeGuideStyle(depth, ancestorContinues);
  const lastCls = (depth >= 1 && isLast) ? " task-last" : "";

  let html = `
    <div class="task-row${task.completed ? " done" : ""}${lastCls}" data-id="${task.id}" style="--depth:${depth};${guideStyle}">
      ${chevron}
      <button class="checkbox" data-action="toggle" aria-label="Terminer"></button>
      <div class="task-body" data-action="edit">
        <div class="task-titleline"><span class="task-title">${esc(task.title)}</span>${lateHtml}${subCount}</div>
        ${meta}
        ${progressHtml}
      </div>
      <button class="task-del" data-action="delete" aria-label="Supprimer">×</button>
    </div>`;

  if (expanded) {
    const kids = childTasks(task.id);
    const childAnc = depth >= 1 ? [...ancestorContinues, !isLast] : [];
    kids.forEach((child, i) => { html += weekTaskTree(child, depth + 1, childAnc, i === kids.length - 1, false); });
  }
  return html;
}

function renderWeek() {
  const today = startOfDay(new Date()).getTime();
  const anchor = startOfDay(state.weekAnchor != null ? state.weekAnchor : today).getTime();
  const days = Array.from({ length: 7 }, (_, i) => anchor + i * DAY_MS);

  // Libellé de la période (mois de l'ancre)
  const a = new Date(anchor);
  $("weekMonth").textContent = MONTH_LABELS[a.getMonth()].replace(/^./, c => c.toUpperCase()) + " " + a.getFullYear();

  // Tâches non terminées et datées (racines ET sous-tâches datées)
  const dated = state.tasks.filter(t => !t.completed && t.dueDate != null);
  const grid = $("weekGrid");
  grid.innerHTML = "";

  days.forEach(dayTs => {
    const dayStart = dayTs, dayEnd = dayTs + DAY_MS - 1;
    const isToday = dayTs === today;

    // Tâches du jour (+ retards repliés dans la colonne d'aujourd'hui)
    let items = dated.filter(t => t.dueDate >= dayStart && t.dueDate <= dayEnd);
    if (isToday) items = items.concat(dated.filter(t => t.dueDate < today));
    items = agendaSort(items);   // heure croissante -> priorité -> ordre manuel

    const bdays = birthdaysOnDay(dayTs);
    const count = items.length + bdays.length;

    const d = new Date(dayTs);
    const wd = isToday ? "Aujourd'hui" : WEEKDAY_LABELS[d.getDay()].replace(/^./, c => c.toUpperCase());
    const dateLabel = d.getDate() + " " + MONTH_LABELS[d.getMonth()].replace(/^./, c => c.toUpperCase());

    let listBody = "";
    items.forEach(t => {
      const late = t.dueDate < today;             // badge "en retard" si échéance passée
      const drag = t.dueTime ? "" : " agenda-drag"; // sans heure = réordonnable
      listBody += `<div class="week-task${drag}" data-id="${t.id}">${weekTaskTree(t, 0, [], true, late)}</div>`;
    });
    let bdayBody = "";
    bdays.forEach(b => {
      const note = b.shifted ? `<div class="week-bday-note">Anniversaire le 29/02 — fêté le 28 février cette année</div>` : "";
      bdayBody += `<div class="week-bday"><div class="week-bday-main">🎂 ${esc(b.contact.name)}</div>${note}</div>`;
    });
    const emptyMark = (items.length === 0 && bdays.length === 0) ? `<div class="week-empty">Rien de prévu</div>` : "";
    const body = `<div class="week-list">${listBody}</div>${bdayBody}${emptyMark}`;

    const col = document.createElement("div");
    col.className = "week-col" + (isToday ? " today" : "");
    col.innerHTML = `
      <div class="week-col-head">
        <span class="week-col-date">${dateLabel}</span>
        <span class="week-col-wd">${wd}</span>
        <span class="week-col-count">${count || ""}</span>
      </div>
      ${body}
      <div class="week-add" data-day="${dayTs}">
        <button class="week-add-btn" type="button"><span class="plus-sm">+</span> Ajouter une tâche</button>
      </div>`;
    grid.appendChild(col);
  });
}

function toggleTask(id) {
  const t = getTask(id);
  if (!t) return;
  // Tâche récurrente (racine, sans sous-tâche) : cocher = passer à la prochaine occurrence.
  if (!t.completed && t.recurrence && t.dueDate != null && childTasks(t.id).length === 0) {
    advanceRecurrence(t);
    db.save();
    render();
    return;
  }
  const done = !t.completed;
  t.completed = done;
  t.completedAt = done ? Date.now() : null;
  setCompletedDeep(id, done);            // (2) cascade : coche/décoche toute la descendance
  if (t.parentTaskId) refreshCompletionUpwards(t.parentTaskId);  // (c) remontée auto vers les parents
  db.save();
  render();
}

// Crée une sous-tâche rattachée à un parent (hérite du projet du parent).
// Les sous-tâches n'ont jamais de priorité : si une sous-tâche devient urgente,
// elle a vocation à être promue en tâche racine à part entière.
function addSubtask(parentId, raw) {
  const parent = getTask(parentId);
  if (!parent || taskDepth(parent) >= MAX_TASK_DEPTH) return;
  const task = makeTask(raw, { urgent: false, important: false }, parent.projectId, parentId);
  state.tasks.push(task);
  if (parent.recurrence) parent.recurrence = null;   // une tâche à sous-tâches n'est plus récurrente
  refreshCompletionUpwards(parentId);   // le parent n'est plus "fait" s'il l'était
  db.save();
}

// Supprime une tâche et toute sa descendance (sous-tâches en cascade), puis met à jour les parents
function deleteTask(id) {
  const t = getTask(id);
  const parentId = t ? t.parentTaskId : null;
  const toRemove = new Set([id]);
  const collect = pid => childTasks(pid).forEach(c => { toRemove.add(c.id); collect(c.id); });
  collect(id);
  state.tasks = state.tasks.filter(t => !toRemove.has(t.id));
  if (parentId) refreshCompletionUpwards(parentId);
  db.save();
  render();
}

/* ---- Modal d'édition ---- */
/* =========================================================
   COMPOSANT DÉROULANT AVEC RECHERCHE (générique, réutilisable)
   createPicker(container, options) monte un sélecteur dans `container`.
   options = {
     items: [{id, label, icon?}],      // choix possibles
     selectedId,                        // id sélectionné (ou null)
     placeholder,                       // texte quand rien n'est sélectionné
     searchPlaceholder,                 // texte du champ de recherche
     onSelect(id)                       // appelé avec l'id choisi (ou null)
   }
   Utilisé pour le projet d'une tâche et le choix d'un contact (délégation).
   ========================================================= */
function createPicker(container, options) {
  const { items, selectedId, placeholder = "Choisir…", searchPlaceholder = "Rechercher…", onSelect } = options;
  let open = false;

  const selected = items.find(it => it.id === selectedId);
  container.className = "picker";
  container.innerHTML = `
    <button class="picker-trigger" type="button">
      <span class="picker-value">${selected ? (selected.icon ? esc(selected.icon) + " " : "") + esc(selected.label) : esc(placeholder)}</span>
      <span class="picker-caret">▾</span>
    </button>
  `;
  const trigger = container.querySelector(".picker-trigger");

  function close() {
    open = false;
    const panel = container.querySelector(".picker-panel");
    if (panel) panel.remove();
    document.removeEventListener("click", onDocClick, true);
  }
  function onDocClick(e) { if (!container.contains(e.target)) close(); }

  function renderPanel(filter = "") {
    let panel = container.querySelector(".picker-panel");
    const q = filter.trim().toLowerCase();
    const filtered = items.filter(it => !q || it.label.toLowerCase().includes(q));
    const optionsHtml = filtered.length
      ? filtered.map(it => `
          <div class="picker-option${it.id === selectedId ? " selected" : ""}" data-id="${it.id == null ? "" : it.id}">
            ${it.icon ? `<span>${esc(it.icon)}</span>` : ""}<span>${esc(it.label)}</span>
            ${it.id === selectedId ? `<span class="check">✓</span>` : ""}
          </div>`).join("")
      : `<div class="picker-empty">Aucun résultat</div>`;
    panel.querySelector(".picker-options").innerHTML = optionsHtml;
  }

  trigger.addEventListener("click", e => {
    e.stopPropagation();
    if (open) { close(); return; }
    open = true;
    const panel = document.createElement("div");
    panel.className = "picker-panel";
    panel.innerHTML = `<input class="picker-search" type="text" placeholder="${esc(searchPlaceholder)}" autocomplete="off"><div class="picker-options"></div>`;
    container.appendChild(panel);
    renderPanel("");
    const search = panel.querySelector(".picker-search");
    search.focus();
    search.addEventListener("input", () => renderPanel(search.value));
    panel.addEventListener("click", ev => {
      const opt = ev.target.closest(".picker-option");
      if (!opt) return;
      const id = opt.dataset.id === "" ? null : opt.dataset.id;
      close();
      onSelect(id);
    });
    setTimeout(() => document.addEventListener("click", onDocClick, true), 0);
  });
}

/* ---- Sélecteur de récurrence (fenêtre d'édition) ---- */
// Règle "simple" par défaut pour une fréquence donnée, ancrée sur la date de la tâche.
function defaultRecurrence(freq) {
  return { freq, interval: 1 };
}

// Une tâche peut-elle être récurrente ? (racine, avec date, sans sous-tâche)
function canRecur(task) {
  return isRoot(task) && task.dueDate != null && childTasks(task.id).length === 0;
}

function setRecurrence(taskId, rec) {
  const t = getTask(taskId);
  if (!t) return;
  t.recurrence = rec;
  db.save();
  render();
  renderEditorRecurrence(t);
}

function renderEditorRecurrence(task) {
  const box = $("editRecur");
  box.innerHTML = "";

  if (!canRecur(task)) {
    const hint = document.createElement("div");
    hint.className = "recur-hint";
    hint.textContent = task.dueDate == null
      ? "Ajoute une date pour activer la récurrence."
      : "La récurrence n'est possible que sur une tâche racine sans sous-tâche.";
    box.appendChild(hint);
    return;
  }

  const rec = task.recurrence;
  // Le <select> de presets. "custom" = on garde la règle telle quelle et on montre les réglages fins.
  const select = document.createElement("select");
  select.className = "recur-select";
  const presets = [
    ["none",   "Jamais"],
    ["day",    "Tous les jours"],
    ["week",   "Toutes les semaines"],
    ["month",  "Tous les mois"],
    ["year",   "Tous les ans"],
    ["custom", "Personnalisé…"]
  ];
  // Quel preset reflète la règle actuelle ?
  let current = "none";
  if (rec) {
    const simple = (rec.interval || 1) === 1 && !rec.nthWeekday &&
                   !(rec.freq === "week" && rec.weekdays && rec.weekdays.length);
    current = simple ? rec.freq : "custom";
  }
  presets.forEach(([v, label]) => {
    const o = document.createElement("option");
    o.value = v; o.textContent = label;
    if (v === current) o.selected = true;
    select.appendChild(o);
  });
  select.addEventListener("change", () => {
    const v = select.value;
    if (v === "none") setRecurrence(task.id, null);
    else if (v === "custom") setRecurrence(task.id, rec || defaultRecurrence("week"));
    else setRecurrence(task.id, defaultRecurrence(v));
  });
  box.appendChild(select);

  if (current !== "custom" || !rec) return;

  // --- Réglages fins (mode personnalisé) ---
  const custom = document.createElement("div");
  custom.className = "recur-custom";

  // Ligne : tous les [N] [unité]
  const row = document.createElement("div");
  row.className = "recur-row";
  row.appendChild(Object.assign(document.createElement("span"), { textContent: "Tous les" }));
  const num = document.createElement("input");
  num.type = "number"; num.min = "1"; num.className = "recur-num"; num.value = rec.interval || 1;
  row.appendChild(num);
  const unit = document.createElement("select");
  unit.className = "recur-unit";
  [["day","jours"],["week","semaines"],["month","mois"],["year","ans"]].forEach(([v,l]) => {
    const o = document.createElement("option"); o.value = v; o.textContent = l;
    if (v === rec.freq) o.selected = true; unit.appendChild(o);
  });
  row.appendChild(unit);
  custom.appendChild(row);

  const commit = patch => setRecurrence(task.id, { ...rec, ...patch });
  num.addEventListener("change", () => commit({ interval: Math.max(1, parseInt(num.value, 10) || 1) }));
  unit.addEventListener("change", () => {
    // Changer d'unité réinitialise les options spécifiques (jours/nthWeekday)
    setRecurrence(task.id, { freq: unit.value, interval: Math.max(1, parseInt(num.value, 10) || 1) });
  });

  // Hebdo : choix des jours
  if (rec.freq === "week") {
    const days = document.createElement("div");
    days.className = "recur-days";
    const sel = new Set(rec.weekdays && rec.weekdays.length ? rec.weekdays : [new Date(task.dueDate).getDay()]);
    WEEKDAY_ORDER.forEach(d => {
      const b = document.createElement("button");
      b.type = "button"; b.className = "recur-day" + (sel.has(d) ? " on" : "");
      b.textContent = WEEKDAY_SHORT[d];
      b.addEventListener("click", () => {
        if (sel.has(d)) sel.delete(d); else sel.add(d);
        if (sel.size === 0) sel.add(d);                 // au moins un jour
        commit({ weekdays: [...sel].sort((a,b) => a-b) });
      });
      days.appendChild(b);
    });
    custom.appendChild(days);
  }

  // Mensuel / annuel : "le <jour du mois>" OU "le <Nième> <jour de semaine>"
  if (rec.freq === "month" || rec.freq === "year") {
    const d = new Date(task.dueDate);
    const mode = document.createElement("div");
    mode.className = "recur-mode";
    const byNth = !!rec.nthWeekday;

    // Option 1 : par date
    const l1 = document.createElement("label");
    const r1 = document.createElement("input"); r1.type = "radio"; r1.name = "recurMode_" + task.id; r1.checked = !byNth;
    const t1 = rec.freq === "month" ? `le ${d.getDate()} du mois` : `le ${d.getDate()} ${MONTH_LABELS[d.getMonth()]}`;
    l1.append(r1, document.createTextNode(t1));
    r1.addEventListener("change", () => { const c = { ...rec }; delete c.nthWeekday; setRecurrence(task.id, c); });
    mode.appendChild(l1);

    // Option 2 : Nième jour de semaine
    const l2 = document.createElement("label");
    const r2 = document.createElement("input"); r2.type = "radio"; r2.name = "recurMode_" + task.id; r2.checked = byNth;
    l2.append(r2, document.createTextNode("le "));
    const nth = rec.nthWeekday || { week: defaultNthWeek(d), day: d.getDay() };
    const selWeek = document.createElement("select");
    [["1","1er"],["2","2e"],["3","3e"],["4","4e"],["-1","dernier"]].forEach(([v,l]) => {
      const o = document.createElement("option"); o.value = v; o.textContent = l;
      if (parseInt(v,10) === nth.week) o.selected = true; selWeek.appendChild(o);
    });
    const selDay = document.createElement("select");
    WEEKDAY_ORDER.forEach(wd => {
      const o = document.createElement("option"); o.value = String(wd); o.textContent = WEEKDAY_LABELS[wd];
      if (wd === nth.day) o.selected = true; selDay.appendChild(o);
    });
    const nthWrap = document.createElement("span"); nthWrap.className = "recur-nth";
    nthWrap.append(selWeek, selDay);
    l2.appendChild(nthWrap);
    const applyNth = () => setRecurrence(task.id, { ...rec, nthWeekday: { week: parseInt(selWeek.value,10), day: parseInt(selDay.value,10) } });
    r2.addEventListener("change", applyNth);
    selWeek.addEventListener("change", applyNth);
    selDay.addEventListener("change", applyNth);
    mode.appendChild(l2);

    custom.appendChild(mode);
  }

  box.appendChild(custom);
}

// Quel ordinal (1er..4e / dernier) correspond à la date d'ancrage, pour préremplir le mode "Nième".
function defaultNthWeek(d) {
  const week = Math.ceil(d.getDate() / 7);
  return week >= 5 ? -1 : week;
}

// Liste des sous-tâches directes dans la fenêtre (cocher / supprimer / ajouter)
function renderEditorSubtasks(task) {
  const kids = childTasks(task.id);
  const canAdd = taskDepth(task) < MAX_TASK_DEPTH;
  const { done, total } = subtaskProgress(task.id);
  $("editSubHead").textContent = total > 0 ? `Sous-tâches  ${done}/${total}` : "Sous-tâches";
  const ul = $("editSubList");
  ul.innerHTML = "";
  kids.forEach(k => {
    const li = document.createElement("li");
    li.className = "editor-sub" + (k.completed ? " done" : "");
    li.dataset.id = k.id;
    // Compteur si cette sous-tâche a elle-même des sous-tâches
    const sub = subtaskProgress(k.id);
    const subCountHtml = sub.total > 0
      ? `<span class="count-badge">🔗 ${sub.done}/${sub.total}</span>` : "";
    li.innerHTML = `
      <button class="checkbox" data-action="toggle" aria-label="Terminer"></button>
      <div class="editor-sub-body" data-action="open">
        <span class="editor-sub-title">${esc(k.title)}</span>
        ${subCountHtml}
      </div>
      <button class="editor-sub-del" data-action="delete" aria-label="Supprimer">×</button>
    `;
    if (k.completed) li.querySelector(".checkbox").classList.add("checked-preview");
    ul.appendChild(li);
  });
  // Le bouton d'ajout n'apparaît que si on peut descendre d'un niveau
  $("editAddSubBtn").style.display = canAdd ? "" : "none";
}

// Fil d'ariane des tâches parentes (pour remonter depuis une sous-tâche)
function renderEditorBreadcrumb(task) {
  const el = $("editBreadcrumb");
  // Remonter la chaîne des parents (de la racine vers le parent direct)
  const chain = [];
  let cur = task.parentTaskId ? getTask(task.parentTaskId) : null;
  while (cur) { chain.unshift(cur); cur = cur.parentTaskId ? getTask(cur.parentTaskId) : null; }
  if (chain.length === 0) { el.hidden = true; el.innerHTML = ""; return; }
  el.hidden = false;
  el.innerHTML = chain.map(p =>
    `<button class="editor-crumb" data-id="${p.id}">${esc(p.title)}</button>`
  ).join('<span class="editor-crumb-sep">›</span>') + '<span class="editor-crumb-sep">›</span>';
}

function dateToInput(t) {
  if (!t.dueDate) return "";
  const d = new Date(t.dueDate);
  let s = d.getDate() + "/" + (d.getMonth()+1) + "/" + d.getFullYear();
  if (t.dueTime) s += " " + t.dueTime;
  return s;
}

// Ajuste la hauteur du champ description à son contenu
function autoGrowDesc() {
  const el = $("editNote");
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

function closeEditor() {
  saveEditorFields();             // sauvegarde titre/description/date avant de fermer
  $("overlay").classList.remove("open");
  document.body.style.overflow = "";   // rétablit le scroll de l'arrière-plan
  state.editingId = null;
  render();
}

// Sauvegarde les champs texte (titre, description, date) de la tâche en cours
function saveEditorFields() {
  const id = state.editingId;
  if (!id) return;
  const t = getTask(id);
  if (!t) return;
  const title = $("editTitle").value.trim();
  if (title) t.title = title;     // on n'efface pas un titre par mégarde
  t.note = $("editNote").value.trim();
  const dateRaw = $("editDate").value.trim();
  const parsed = dateRaw ? parseInput(dateRaw) : { dueDate: null, dueTime: null };
  t.dueDate = parsed.dueDate;
  t.dueTime = parsed.dueTime;
  if (t.dueDate == null) t.recurrence = null;   // une récurrence sans date n'a pas de sens
  db.save();
  renderEditorRecurrence(t);                      // la date conditionne la récurrence
}

/* =========================================================
   DRAG AND DROP GÉNÉRIQUE (souris + tactile)
   Un seul moteur pour la matrice Eisenhower ET le Kanban des projets.
   On l'active sur un "board" via makeDraggable(board, config) où config décrit :
     item    : sélecteur des cartes déplaçables (".task", ".proj-card")
     column  : sélecteur des colonnes (".eisen-cell", ".kanban-col")
     list    : sélecteur de la zone listée dans une colonne
     onDrop  : (carte, colonne) => applique l'attribut (priorité, statut…)
     persist : () => réordonne la collection depuis le DOM puis sauvegarde
   ========================================================= */
let drag = null;
let lastDragEnd = 0;

function makeDraggable(board, config) {
  board.addEventListener("pointerdown", e => onDragPointerDown(e, board, config));
}

// Réordonne un tableau d'objets {id} selon l'ordre des éléments affichés
function reorderFromDOM(collection, domSelector) {
  const ids = [...document.querySelectorAll(domSelector)].map(el => el.dataset.id).filter(Boolean);
  const byId = {};
  collection.forEach(o => { byId[o.id] = o; });
  const seen = new Set(ids);
  const ordered = ids.map(id => byId[id]).filter(Boolean);
  const rest = collection.filter(o => !seen.has(o.id));  // éléments non affichés (ex : tâches terminées)
  return [...ordered, ...rest];
}

function columnUnderPoint(x, y, selector) {
  const el = document.elementFromPoint(x, y);
  return el ? el.closest(selector) : null;
}

// Renvoie la carte avant laquelle insérer (ou null pour la fin de la colonne)
function insertBeforeEl(list, y, itemSelector) {
  const items = [...list.querySelectorAll(itemSelector + ":not(.dragging)")];
  for (const el of items) {
    const r = el.getBoundingClientRect();
    if (y < r.top + r.height / 2) return el;
  }
  return null;
}

function onDragPointerDown(e, board, config) {
  if (e.button != null && e.button !== 0) return;                 // clic gauche / tactile uniquement
  const itemEl = e.target.closest(config.item);
  if (!itemEl || !board.contains(itemEl)) return;
  // ne pas démarrer sur un contrôle interne (cocher, supprimer, bouton +, champ de saisie)
  if (e.target.closest("button, input, [data-action='toggle'], [data-action='delete']")) return;

  drag = {
    config, board, itemEl,
    id: itemEl.dataset.id,
    startX: e.clientX, startY: e.clientY,
    started: false, isTouch: e.pointerType === "touch", timer: null
  };

  // Mobile : appui long pour activer (sinon = défilement)
  if (drag.isTouch) drag.timer = setTimeout(() => startDrag(), 320);

  window.addEventListener("pointermove", onDragPointerMove);
  window.addEventListener("pointerup", onDragPointerUp);
  window.addEventListener("pointercancel", cancelDrag);
}

function startDrag() {
  if (!drag || drag.started) return;
  drag.started = true;

  const rect = drag.itemEl.getBoundingClientRect();
  const ghost = drag.itemEl.cloneNode(true);
  ghost.classList.add("drag-ghost");
  ghost.style.width = rect.width + "px";
  ghost.style.left = rect.left + "px";
  ghost.style.top = rect.top + "px";
  document.body.appendChild(ghost);

  drag.ghost = ghost;
  drag.offsetX = drag.startX - rect.left;
  drag.offsetY = drag.startY - rect.top;
  drag.itemEl.classList.add("dragging");
  document.body.classList.add("is-dragging");
  if (navigator.vibrate) navigator.vibrate(15);
}

function onDragPointerMove(e) {
  if (!drag) return;
  const { config } = drag;
  const dx = Math.abs(e.clientX - drag.startX);
  const dy = Math.abs(e.clientY - drag.startY);

  if (!drag.started) {
    if (drag.isTouch) {
      if (dx > 8 || dy > 8) cancelDrag();   // a bougé avant l'appui long -> défilement
    } else if (dx > 6 || dy > 6) {
      startDrag();                          // souris : seuil avant de glisser
    }
    if (!drag || !drag.started) return;
  }

  e.preventDefault();
  drag.ghost.style.left = (e.clientX - drag.offsetX) + "px";
  drag.ghost.style.top = (e.clientY - drag.offsetY) + "px";

  const col = columnUnderPoint(e.clientX, e.clientY, config.column);
  drag.board.querySelectorAll(config.column).forEach(c => c.classList.toggle("drop-target", c === col));

  // Repositionne la carte à la place visée, dans la colonne survolée
  if (col) {
    const list = col.querySelector(config.list);
    const emptyMark = list.querySelector(".col-empty");
    if (emptyMark) emptyMark.remove();
    const before = insertBeforeEl(list, e.clientY, config.item);
    if (before) list.insertBefore(drag.itemEl, before);
    else list.appendChild(drag.itemEl);
  }
}

function onDragPointerUp() {
  if (!drag) return;
  const { config } = drag;
  const wasDragging = drag.started;
  if (wasDragging) {
    const col = drag.itemEl.closest(config.column);  // colonne d'arrivée réelle
    if (col) config.onDrop(drag.itemEl, col);
    config.persist();
  }
  cleanupDrag();
  if (wasDragging) { lastDragEnd = Date.now(); render(); }
}

function cancelDrag() { cleanupDrag(); }

function cleanupDrag() {
  if (!drag) return;
  if (drag.timer) clearTimeout(drag.timer);
  if (drag.ghost) drag.ghost.remove();
  if (drag.itemEl) drag.itemEl.classList.remove("dragging");
  document.body.classList.remove("is-dragging");
  if (drag.board) drag.board.querySelectorAll(drag.config.column).forEach(c => c.classList.remove("drop-target"));
  window.removeEventListener("pointermove", onDragPointerMove);
  window.removeEventListener("pointerup", onDragPointerUp);
  window.removeEventListener("pointercancel", cancelDrag);
  drag = null;
}

function bindEvents() {
  // Ajout rapide
  document.getElementById("quickSubmit").addEventListener("click", addTask);
  // Entrée n'importe où dans la zone de saisie = ajouter (jamais activer un bouton focusé)
  document.querySelector(".quick-add").addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); addTask(); }
  });

  // Boutons de priorité (saisie rapide + vue Liste d'un projet) : toggle générique.
  // Les cartes projet du Kanban sont gérées séparément par onProjectBoardClick.
  document.querySelectorAll(".quick-add").forEach(zone => {
    zone.addEventListener("click", e => {
      const flag = e.target.closest(".flag");
      if (flag) flag.classList.toggle("on");
    });
  });

  // Tri
  document.getElementById("sortSelect").addEventListener("change", e => {
    state.sort = e.target.value;
    render();
  });

  // Navigation sidebar
  document.querySelectorAll(".nav-item[data-view]").forEach(b => {
    b.addEventListener("click", () => navigate(b.dataset.view));
  });

  // Navigation de la vue semaine (Prochainement)
  const shiftWeek = days => {
    const base = state.weekAnchor != null ? state.weekAnchor : startOfDay(new Date()).getTime();
    state.weekAnchor = startOfDay(base + days * DAY_MS).getTime();
    render();
  };
  $("weekPrev").addEventListener("click", () => shiftWeek(-7));
  $("weekNext").addEventListener("click", () => shiftWeek(7));
  $("weekToday").addEventListener("click", () => { state.weekAnchor = null; render(); });

  // Le "+" d'une colonne ouvre le pop-up d'ajout
  $("weekGrid").addEventListener("click", e => {
    const addBtn = e.target.closest(".week-add-btn");
    if (addBtn) openWeekAdd(Number(addBtn.closest(".week-add").dataset.day));
  });

  // Pop-up d'ajout : ouverture / fermeture / validation / priorité
  const modal = $("weekAddModal");
  modal.addEventListener("click", e => {
    if (e.target === modal) return closeWeekAdd();           // clic sur le fond
    const flag = e.target.closest(".flag");
    if (flag) flag.classList.toggle("on");
  });
  $("weekAddCancel").addEventListener("click", closeWeekAdd);
  $("weekAddSubmit").addEventListener("click", submitWeekAdd);
  $("weekAddInput").addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); submitWeekAdd(); }
    else if (e.key === "Escape") closeWeekAdd();
  });
  document.getElementById("focusAdd").addEventListener("click", () => {
    closeSidebar();
    document.getElementById("quickInput").focus();
  });

  // Clics sur les tâches (délégation sur tout le main : liste + matrice).
  // L'id vient de la LIGNE (.task-row) car une carte racine contient plusieurs lignes.
  document.querySelector(".main").addEventListener("click", e => {
    if (Date.now() - lastDragEnd < 300) return;  // un drag vient de se terminer
    const row = e.target.closest(".task-row");
    if (!row) return;
    const id = row.dataset.id;
    const action = e.target.closest("[data-action]")?.dataset.action;
    if (action === "toggle") toggleTask(id);
    else if (action === "delete") deleteTask(id);
    else if (action === "toggle-children") toggleChildren(id);
    else if (action === "add-sub") openSubtaskInput(id);
    else if (action === "edit") openEditor(id);
  });

  // Saisie d'une sous-tâche : Entrée valide, Échap referme (pas de priorité sur les sous-tâches)
  document.querySelector(".main").addEventListener("keydown", e => {
    const input = e.target.closest(".task-addsub-input");
    if (!input) return;
    if (e.key === "Enter") {
      const parentId = input.closest(".task-addsub-zone").dataset.id;
      const raw = input.value.trim();
      if (raw) {
        addSubtask(parentId, raw);
        render();
      }
    } else if (e.key === "Escape") {
      render();
    }
  });

  // Fenêtre d'édition (sauvegarde directe)
  $("editClose").addEventListener("click", closeEditor);
  $("editBreadcrumb").addEventListener("click", e => {
    const crumb = e.target.closest(".editor-crumb");
    if (crumb) openEditor(crumb.dataset.id);   // remonter à la tâche parente
  });
  $("editDelete").addEventListener("click", () => {
    if (state.editingId) { const id = state.editingId; $("overlay").classList.remove("open"); state.editingId = null; deleteTask(id); }
  });
  $("overlay").addEventListener("click", e => { if (e.target.id === "overlay") closeEditor(); });

  // Priorité : appliquée immédiatement à la tâche éditée
  ["editUrgent","editImportant"].forEach(bid => {
    $(bid).addEventListener("click", e => {
      const flag = e.currentTarget;
      flag.classList.toggle("on");
      const t = getTask(state.editingId);
      if (t) { t[flag.dataset.flag] = flag.classList.contains("on"); db.save(); render(); }
    });
  });

  // Cocher la tâche elle-même depuis la fenêtre
  $("editCheckbox").addEventListener("click", () => {
    if (state.editingId) {
      toggleTask(state.editingId);
      const t = getTask(state.editingId);
      if (t) {
        renderEditorSubtasks(t);
        $("editDate").value = dateToInput(t);          // la date a pu avancer (récurrence)
        $("editCheckbox").classList.toggle("checked-preview", !!t.completed);
        renderEditorRecurrence(t);
      }
    }
  });

  // Titre / description / date : sauvegardés quand on quitte le champ
  $("editTitle").addEventListener("blur", saveEditorFields);
  $("editNote").addEventListener("blur", saveEditorFields);
  $("editNote").addEventListener("input", autoGrowDesc);
  $("editDate").addEventListener("blur", saveEditorFields);
  $("editDate").addEventListener("keydown", e => { if (e.key === "Enter") { e.preventDefault(); saveEditorFields(); const t = getTask(state.editingId); if (t) $("editDate").value = dateToInput(t); } });

  // Sous-tâches dans la fenêtre : ouvrir le champ, cocher, supprimer, ouvrir une sous-tâche
  $("editAddSubBtn").addEventListener("click", () => {
    $("editAddSubBtn").style.display = "none";
    const input = $("editAddSubInput"); input.hidden = false; input.value = ""; input.focus();
  });
  $("editAddSubInput").addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const raw = e.target.value.trim();
      if (raw && state.editingId) {
        addSubtask(state.editingId, raw);
        const t = getTask(state.editingId);
        renderEditorSubtasks(t);
        const input = $("editAddSubInput"); input.value = ""; input.hidden = false;
        $("editAddSubBtn").style.display = "none"; input.focus();   // reste ouvert pour enchaîner
      }
    } else if (e.key === "Escape") {
      e.target.hidden = true; $("editAddSubBtn").style.display = "";
    }
  });
  $("editAddSubInput").addEventListener("blur", e => {
    if (!e.target.value.trim()) { e.target.hidden = true; $("editAddSubBtn").style.display = ""; }
  });
  $("editSubList").addEventListener("click", e => {
    const li = e.target.closest(".editor-sub");
    if (!li) return;
    const subId = li.dataset.id;
    const action = e.target.closest("[data-action]")?.dataset.action;
    if (action === "toggle") {
      toggleTask(subId);
      const t = getTask(state.editingId); if (t) renderEditorSubtasks(t);
    } else if (action === "delete") {
      deleteTask(subId);
      const t = getTask(state.editingId); if (t) renderEditorSubtasks(t);
    } else if (action === "open") {
      openEditor(subId);   // ouvrir la sous-tâche dans la fenêtre
    }
  });

  // Afficher / masquer le menu latéral
  document.getElementById("sidebarToggle").addEventListener("click", toggleSidebar);
  document.getElementById("scrim").addEventListener("click", closeSidebar);

  // Drag and drop : matrice Eisenhower (globale) et Kanban des projets
  setupEisenBoard($("eisenGrid"), () => null);          // vue globale : tâches libres
  setupEisenBoard($("projEisenGrid"), () => state.projectId); // matrice d'un projet
  setupEisenBoard($("projectsEisenGrid"), () => null, { reorder: false }); // synthèse projets actifs

  const kanban = $("kanbanBoard");
  makeDraggable(kanban, {
    item: ".proj-card", column: ".kanban-col", list: ".kanban-list",
    onDrop(itemEl, colEl) {
      const p = getProject(itemEl.dataset.id);
      if (!p) return;
      const newStatus = colEl.dataset.status;
      if (newStatus === "delegue" && p.status !== "delegue") {
        const contactId = pickContact();
        if (contactId !== false) { p.status = "delegue"; p.assigneeId = contactId; }
        // si annulé, le statut reste inchangé (la carte reviendra à sa place au prochain render)
      } else {
        p.status = newStatus;
        if (newStatus !== "delegue") p.assigneeId = null;
      }
    },
    persist() { state.projects = reorderFromDOM(state.projects, "#kanbanBoard .proj-card"); db.save(); }
  });

  // Réordonner les tâches de MÊME priorité SANS heure (vues Aujourd'hui & Prochainement).
  // Le tri (agendaSort) re-cale ensuite heure/priorité : un drag ne peut donc changer que
  // l'ordre manuel à l'intérieur d'un groupe même-priorité-sans-heure. Persistance limitée
  // au board actif (l'autre board garde des .agenda-drag obsolètes car simplement masqué).
  makeDraggable($("todayBoard"), {
    item: ".agenda-drag", column: ".agenda-col", list: ".task-list",
    onDrop() {},
    persist() { state.tasks = reorderFromDOM(state.tasks, "#todayBoard .agenda-drag"); db.save(); }
  });
  makeDraggable($("weekGrid"), {
    item: ".agenda-drag", column: ".week-col", list: ".week-list",
    onDrop() {},
    persist() { state.tasks = reorderFromDOM(state.tasks, "#weekGrid .agenda-drag"); db.save(); }
  });

  // Clics et saisies sur les cartes projet : mêmes handlers pour le Kanban et la liste des terminés
  kanban.addEventListener("click", onProjectBoardClick);
  kanban.addEventListener("keydown", onProjectBoardKeydown);
  const doneList = $("projectsDone");
  doneList.addEventListener("click", onProjectBoardClick);
  doneList.addEventListener("keydown", onProjectBoardKeydown);

  // Onglets de la vue Projets : Tableau / Terminés
  $("projectsTabs").addEventListener("click", e => {
    const btn = e.target.closest(".subview-btn");
    if (btn) { state.projectsTab = btn.dataset.ptab; render(); }
  });

  // Vue détaillée d'un projet
  $("projBack").addEventListener("click", () => navigate("projects"));
  $("projName").addEventListener("change", e => {
    if (state.projectId) db.updateProject(state.projectId, { name: e.target.value.trim() || "Sans titre" });
  });
  $("projIcon").addEventListener("click", () => {
    const current = getProject(state.projectId);
    const icon = prompt("Emoji du projet :", current ? current.icon : DEFAULT_PROJECT_ICON);
    if (icon != null) { db.updateProject(state.projectId, { icon: icon.trim() || DEFAULT_PROJECT_ICON }); render(); }
  });
  $("projStatus").addEventListener("change", e => {
    if (!state.projectId) return;
    const ok = setProjectStatus(state.projectId, e.target.value);
    render();   // resynchronise le sélecteur (utile si l'assignation a été annulée)
  });
  document.querySelectorAll(".subview-btn").forEach(b => {
    b.addEventListener("click", () => { state.projSub = b.dataset.sub; render(); });
  });
  $("projTaskSubmit").addEventListener("click", addProjectTaskFromInput);
  $("projTaskInput").addEventListener("keydown", e => {
    if (e.key === "Enter") { e.preventDefault(); addProjectTaskFromInput(); }
  });

  // Vue Contacts
  $("contactSearch").addEventListener("input", e => {
    state.contactSearch = e.target.value;
    renderContacts();   // on ne redessine que la liste (le champ garde le focus)
  });
  $("contactAdd").addEventListener("click", () => {
    const name = prompt("Nom du contact :");
    if (name && name.trim()) { db.addContact({ id: uid(), name: name.trim(), birthday: null }); render(); }
  });
  $("contactList").addEventListener("click", e => {
    const card = e.target.closest(".contact-card");
    if (!card) return;
    const id = card.dataset.id;
    const action = e.target.closest("[data-action]")?.dataset.action;
    const projEl = e.target.closest(".contact-proj");
    if (action === "del") {
      deleteContact(id);
    } else if (action === "bday") {
      // ouvre le champ de saisie de l'anniversaire
      const label = e.target.closest(".contact-bday");
      const input = card.querySelector(".contact-bday-input");
      label.hidden = true;
      input.hidden = false;
      input.focus();
      input.select();
    } else if (projEl) {
      openProject(projEl.dataset.proj);
    }
  });
  // Saisie de l'anniversaire : insertion auto du "/" après le jour
  $("contactList").addEventListener("input", e => {
    const input = e.target.closest(".contact-bday-input");
    if (!input) return;
    let v = input.value.replace(/[^\d]/g, "").slice(0, 4);     // ne garder que les chiffres (JJMM)
    if (v.length >= 3) v = v.slice(0, 2) + "/" + v.slice(2);   // JJ + / + MM
    input.value = v;
  });
  $("contactList").addEventListener("keydown", e => {
    const input = e.target.closest(".contact-bday-input");
    if (!input) return;
    if (e.key === "Enter") { e.preventDefault(); input.blur(); }
    else if (e.key === "Escape") { render(); }
  });
  $("contactList").addEventListener("focusout", e => {
    const input = e.target.closest(".contact-bday-input");
    if (input) saveBirthday(input.closest(".contact-card").dataset.id, input.value);
  });

  // Bascule thème clair / nuit
  document.getElementById("themeToggle").addEventListener("click", toggleTheme);
}

// Supprime un contact (les projets délégués perdent leur assignation, sans être supprimés)
function deleteContact(id) {
  const c = getContact(id);
  if (!c) return;
  if (!confirm(`Supprimer le contact « ${c.name} » ?`)) return;
  state.projects.forEach(p => { if (p.assigneeId === id) p.assigneeId = null; });
  db.removeContact(id);   // sauvegarde
  render();
}

// Enregistre l'anniversaire saisi (JJ/MM) au format stocké "MM-JJ". Vide = effacer.
function saveBirthday(id, raw) {
  const t = (raw || "").trim();
  if (t === "") { db.updateContact(id, { birthday: null }); render(); return; }
  const m = t.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (!m) { render(); return; }   // format incomplet : on annule sans rien casser
  const day = parseInt(m[1], 10), mon = parseInt(m[2], 10);
  if (day < 1 || day > 31 || mon < 1 || mon > 12) { render(); return; }
  const pad = n => String(n).padStart(2, "0");
  db.updateContact(id, { birthday: pad(mon) + "-" + pad(day) });
  render();
}

// Câble une matrice Eisenhower (drag + ajout inline par case). getProjectId rattache
// les nouvelles tâches à un projet (null pour la vue globale).
// opts.reorder (défaut true) : réordonner state.tasks selon l'ordre affiché. Désactivé
// pour la synthèse multi-projets (le drag n'y sert qu'à changer la priorité).
function setupEisenBoard(board, getProjectId, opts = {}) {
  const reorder = opts.reorder !== false;
  makeDraggable(board, {
    item: ".task", column: ".eisen-cell", list: ".task-list",
    onDrop(itemEl, colEl) {
      const flags = QUADRANTS[colEl.dataset.q];
      const t = getTask(itemEl.dataset.id);
      if (t) { t.urgent = flags.urgent; t.important = flags.important; }
    },
    persist() {
      if (reorder) state.tasks = reorderFromDOM(state.tasks, "#" + board.id + " .task");
      db.save();
    }
  });
  board.addEventListener("click", e => {
    const btn = e.target.closest(".eisen-add-btn");
    if (!btn) return;
    btn.hidden = true;
    const input = btn.closest(".eisen-add").querySelector(".eisen-add-input");
    input.hidden = false; input.focus();
  });
  board.addEventListener("keydown", e => {
    const input = e.target.closest(".eisen-add-input");
    if (!input) return;
    if (e.key === "Enter") {
      const raw = input.value.trim();
      if (raw) {
        addTaskInQuadrant(input.closest(".eisen-cell").dataset.q, raw, getProjectId());
        input.value = "";
        render();
      }
    } else if (e.key === "Escape") {
      closeEisenAdd(input);
    }
  });
  board.addEventListener("focusout", e => {
    const input = e.target.closest(".eisen-add-input");
    if (input && !input.value.trim()) closeEisenAdd(input);
  });
}

// Ajoute une tâche au projet ouvert depuis le champ de la sous-vue liste
function addProjectTaskFromInput() {
  const input = $("projTaskInput");
  const raw = input.value.trim();
  if (!raw || !state.projectId) return;
  const wrap = input.closest(".quick-add");
  addTaskToProject(state.projectId, raw, readFlags(wrap));
  input.value = "";
  wrap.querySelectorAll(".flag").forEach(f => f.classList.remove("on"));
  render();
  $("projTaskInput").focus();
}

// Clic sur une carte projet (Kanban ou liste des terminés) : supprimer, ouvrir un champ
// d'ajout (projet/tâche), basculer un bouton de priorité, ou ouvrir le projet.
function onProjectBoardClick(e) {
  if (Date.now() - lastDragEnd < 300) return;       // pas juste après un drag
  const delBtn = e.target.closest(".proj-del");
  const colAdd = e.target.closest(".col-add-btn");
  const projAdd = e.target.closest(".proj-add");
  if (delBtn) {
    deleteProject(delBtn.closest(".proj-card").dataset.id);
  } else if (colAdd) {
    colAdd.hidden = true;
    const input = colAdd.closest(".col-add").querySelector(".col-add-input");
    input.hidden = false; input.focus();
  } else if (projAdd) {
    // ouvre la zone d'ajout (champ + boutons de priorité)
    projAdd.hidden = true;
    const zone = projAdd.closest(".proj-card").querySelector(".proj-add-zone");
    zone.hidden = false;
    zone.querySelector(".proj-add-input").focus();
  } else if (e.target.closest(".flag")) {
    e.target.closest(".flag").classList.toggle("on");   // priorité dans la zone d'ajout
  } else if (!e.target.closest(".proj-add-zone")) {
    const card = e.target.closest(".proj-card");
    if (card) openProject(card.dataset.id);
  }
}

function onProjectBoardKeydown(e) {
  const input = e.target.closest(".col-add-input, .proj-add-input");
  if (!input) return;
  if (e.key === "Enter") {
    const raw = input.value.trim();
    if (!raw) return;
    if (input.classList.contains("col-add-input")) {
      addProject(input.closest(".kanban-col").dataset.status, raw);
    } else {
      const flags = readFlags(input.closest(".proj-add-zone"));
      addTaskToProject(input.closest(".proj-card").dataset.id, raw, flags);
    }
    render();
  } else if (e.key === "Escape") {
    render();   // referme les champs en redessinant
  }
}

/* =========================================================
   THÈME CLAIR / NUIT
   ========================================================= */
function setTheme(dark) {
  document.body.classList.toggle("dark", dark);
  document.getElementById("themeToggle").textContent = dark ? "☀️" : "🌙";
  localStorage.setItem(THEME_KEY, dark ? "dark" : "light");
}
function initTheme() {
  setTheme(localStorage.getItem(THEME_KEY) === "dark");
}
function toggleTheme() {
  setTheme(!document.body.classList.contains("dark"));
}

/* =========================================================
   INIT
   ========================================================= */
function init() {
  db.load();
  applyMode();
  bindEvents();
  initTheme();
  render();
}
init();
</script>
